<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شجرة عائلة السني - النسخة المعتمدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --link-color: #059669; --bg: #f1f5f9; --card-bg: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: var(--primary); }
        .header-box { text-align: center; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 900px; margin-bottom: 20px; }
        .search-container { width: 100%; max-width: 550px; margin-bottom: 30px; position: relative; }
        #familySearch { width: 100%; padding: 15px 20px; border-radius: 30px; border: 2px solid #e2e8f0; font-family: 'Tajawal'; font-size: 1rem; outline: none; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 15px; margin-top: 5px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 5000; max-height: 250px; overflow-y: auto; display: none; }
        .search-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .search-item:hover { background: #f0f7ff; color: var(--accent); }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .branch-card { background: var(--card-bg); padding: 25px; border-radius: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); cursor: pointer; text-align: center; border: 1px solid #e2e8f0; transition: 0.3s ease; }
        .branch-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 6000; }
        .modal-content { background: white; padding: 35px; border-radius: 25px; width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: #f1f5f9; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .close-btn { border: none; background: #fee2e2; color: #dc2626; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }
        .partner-box { background: #eff6ff; padding: 18px; border-radius: 15px; margin: 15px 0; border-right: 5px solid var(--accent); }
        .child-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .child-item { background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; cursor: pointer; text-align: center; }
        .child-item.has-link { border-color: var(--link-color); background: #f0fdf4; font-weight: bold; }
        .view-family-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header-box">
        <h2 style="margin:0; color:var(--accent)">شجرة عائلة السني التفاعلية</h2>
    </div>

    <div class="search-container">
        <input type="text" id="familySearch" placeholder="ابحث بالإسم (يظهر النسب للأب)..." oninput="handleSearch()">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div class="main-grid">
        <div class="branch-card" onclick="openModal('soliman')"><h3>فرع سليمان (الجاك)</h3></div>
        <div class="branch-card" onclick="openModal('othman')"><h3>فرع عثمان (حنان)</h3></div>
        <div class="branch-card" onclick="openModal('mohammed_s')"><h3>فرع محمد (السني)</h3></div>
        <div class="branch-card" onclick="openModal('bat_almona')"><h3>فرع بت المنى</h3></div>
    </div>

    <div class="modal" id="familyModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-nav">
                <button class="back-btn" id="backBtn" onclick="goBack()" style="visibility: hidden;">← رجوع</button>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let navigationHistory = [];

        // القاعدة المنظمة: الأبناء تحت الأب دائماً
        const familyData = {
            'soliman': { name: 'سليمان (الجاك)', partner: 'غير مسجل', children: [{name:'عمر', id:'omar_s'}, {name:'الروضة', id:'rawda_s'}, {name:'عبد الغني', id:'abdelghani_s'}, {name:'فاطمة', id:'fatima_s'}, {name:'نفيسة', id:'nefisa_s'}, {name:'النعمة'}, {name:'أم الحسين'}, {name:'مدينة'}, {name:'عبد القيوم'}, {name:'عبد العظيم'}] },
            'othman': { name: 'عثمان (حنان)', partner: 'غير مسجل', children: [{name:'عبد الله', id:'abdullah_o'}, {name:'زينب', id:'zeinab_o'}, {name:'محمد'}, {name:'فاطمة'}] },
            'mohammed_s': { name: 'محمد (السني)', partner: 'غير مسجل', children: [{name:'عباس', id:'abbas_m'}, {name:'بخيت'}, {name:'عوض الله'}, {name:'عبد الرحمن'}] },
            
            // الآباء (مركز الأبناء)
            'omar_s': { name: 'عمر سليمان الجاك', partner: 'زينب عثمان (حنان)', partnerId: 'zeinab_o', children: [{name:'سفيان'}, {name:'إشراقة', id:'ishraga_o'}, {name:'هويدا', id:'hweida_o'}, {name:'سيف الدين'}, {name:'شمس الدين'}, {name:'حيدر'}, {name:'نادية'}, {name:'رفيدة'}, {name:'اعتدال', id:'etidal_o'}, {name:'رقية'}, {name:'أمل'}] },
            'abdullah_o': { name: 'عبد الله عثمان حنان', partner: 'غير مسجل', children: [{name:'المعز'}, {name:'مجدي'}, {name:'محمد'}, {name:'منذر'}, {name:'رحاب'}, {name:'رانيا'}, {name:'رندا'}, {name:'ريان'}] },
            'abbas_m': { name: 'عباس محمد السني', partner: 'غير مسجل', children: [{name:'نازك'}, {name:'محمد'}, {name:'مهند'}, {name:'مصطفي'}, {name:'مهتدي'}] },
            'hashem_s': { name: 'هاشم صالح علي', partner: 'إشراقة عمر سليمان', partnerId: 'ishraga_o', children: [{name:'نادر'}, {name:'ريم'}, {name:'رؤي'}, {name:'رزان'}] },
            'abdelmalek_f': { name: 'عبد الملك محمد علي فضيل', partner: 'اعتدال عمر سليمان', partnerId: 'etidal_o', children: [{name:'محمد'}] },
            
            // الأمهات (رابط لصفحة الأبناء تحت الأب)
            'zeinab_o': { name: 'زينب عثمان (حنان)', partner: 'عمر سليمان (الجاك)', partnerId: 'omar_s', isMother: true },
            'ishraga_o': { name: 'إشراقة عمر سليمان', partner: 'هاشم صالح علي', partnerId: 'hashem_s', isMother: true },
            'etidal_o': { name: 'اعتدال عمر سليمان', partner: 'عبد الملك فضيل', partnerId: 'abdelmalek_f', isMother: true },
            'hweida_o': { name: 'هويدا عمر سليمان', partner: 'محمد خير عبدالرحمن', children: [{name:'عامر'}, {name:'أحمد'}, {name:'أواب'}, {name:'أنس'}, {name:'زينب'}, {name:'مصطفى'}] },
            'fatima_s': { name: 'فاطمة سليمان الجاك', partner: 'محمد علي فضيل', partnerId: 'abdelmalek_f', isMother: true },
            'nefisa_s': { name: 'نفيسة سليمان الجاك', partner: 'صالح علي أبوالحسن', partnerId: 'hashem_s', isMother: true },
            
            'rawda_s': { name: 'الروضة سليمان الجاك', partner: 'غير مسجل', children: [] },
            'abdelghani_s': { name: 'عبد الغني سليمان الجاك', partner: 'غير مسجل', children: [] },
            'bat_almona': { name: 'بت المنى', partner: 'غير مسجل', children: [{name:'العوض'}, {name:'على'}, {name:'نفيسة'}, {name:'مسرة'}] }
        };

        function norm(t) { return t.replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/[ىي]/g, "ي").trim(); }

        function handleSearch() {
            const input = document.getElementById('familySearch');
            const resBox = document.getElementById('searchResults');
            const q = norm(input.value);
            if (q.length < 2) { resBox.style.display = 'none'; return; }
            let matches = [];
            for (let id in familyData) {
                const p = familyData[id];
                if (norm(p.name).includes(q)) matches.push({ n: p.name, id: id });
                if (p.children) {
                    p.children.forEach(c => {
                        const fullName = `${c.name} ${p.name}`;
                        if (norm(fullName).includes(q)) matches.push({ n: fullName, id: c.id || id });
                    });
                }
            }
            if (matches.length > 0) {
                const unique = Array.from(new Set(matches.map(a => a.n))).map(n => matches.find(a => a.n === n));
                resBox.innerHTML = unique.map(m => `<div class="search-item" onclick="selectSearch('${m.id}')">${m.n}</div>`).join('');
                resBox.style.display = 'block';
            } else { resBox.style.display = 'none'; }
        }

        function selectSearch(id) { document.getElementById('searchResults').style.display = 'none'; document.getElementById('familySearch').value = ""; openModal(id); }

        function openModal(id, save = true) {
            const p = familyData[id]; if (!p) return;
            if (save && navigationHistory[navigationHistory.length - 1] !== id) navigationHistory.push(id);
            updateBackButton();
            let h = `<h2 style="color:var(--accent); margin-top:0;">${p.name}</h2>`;
            h += `<div class="partner-box"><strong>الزوج / الزوجة:</strong> ${p.partner}</div>`;
            
            if (p.isMother && p.partnerId) {
                h += `<p>الأبناء مسجلون تحت اسم الأب:</p>`;
                h += `<button class="view-family-btn" onclick="openModal('${p.partnerId}')">عرض أبناء ${p.partner} 📁</button>`;
            } else if (p.children) {
                h += `<h3>الأبناء:</h3><div class="child-list">`;
                p.children.forEach(c => {
                    h += `<div class="child-item ${c.id ? 'has-link' : ''}" onclick="${c.id ? `openModal('${c.id}')` : ''}">${c.name} ${c.id ? '←' : ''}</div>`;
                });
                h += `</div>`;
            }
            document.getElementById('modalBody').innerHTML = h;
            document.getElementById('familyModal').style.display = 'flex';
        }

        function goBack() { if (navigationHistory.length > 1) { navigationHistory.pop(); openModal(navigationHistory[navigationHistory.length - 1], false); } updateBackButton(); }
        function updateBackButton() { document.getElementById('backBtn').style.visibility = navigationHistory.length > 1 ? 'visible' : 'hidden'; }
        function closeModal() { document.getElementById('familyModal').style.display = 'none'; navigationHistory = []; updateBackButton(); }
        document.addEventListener('click', (e) => { if (!e.target.closest('.search-container')) document.getElementById('searchResults').style.display = 'none'; });
    </script>
</body>
</html>
