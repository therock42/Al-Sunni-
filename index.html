<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شجرة عائلة السني - النسخة الاحترافية 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --link-color: #059669; --bg: #f1f5f9; --card-bg: #ffffff; --text-muted: #64748b; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: var(--primary); }
        .header-box { text-align: center; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 900px; margin-bottom: 20px; }
        .search-container { width: 100%; max-width: 550px; margin-bottom: 30px; position: relative; }
        #familySearch { width: 100%; padding: 15px 20px; border-radius: 30px; border: 2px solid #e2e8f0; font-family: 'Tajawal'; font-size: 1rem; outline: none; transition: 0.3s; box-sizing: border-box; width: 100%; }
        .search-results { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 15px; margin-top: 5px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 5000; max-height: 250px; overflow-y: auto; display: none; }
        .search-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .search-item:hover { background: #f0f7ff; color: var(--accent); }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .branch-card { background: var(--card-bg); padding: 25px; border-radius: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); cursor: pointer; text-align: center; border: 1px solid #e2e8f0; transition: 0.3s ease; }
        .branch-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 6000; }
        .modal-content { background: white; padding: 35px; border-radius: 25px; width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: #f1f5f9; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Tajawal'; }
        .close-btn { border: none; background: #fee2e2; color: #dc2626; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }
        .partner-box { background: #eff6ff; padding: 18px; border-radius: 15px; margin: 15px 0; border-right: 5px solid var(--accent); }
        .child-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .child-item.has-branch { background: #f0fdf4; border: 1px solid var(--link-color); color: var(--link-color); cursor: pointer; font-weight: bold; padding: 12px; border-radius: 10px; text-align: center; }
        .child-item.no-branch { background: #f8fafc; border: 1px solid #e2e8f0; color: var(--primary); cursor: default; padding: 12px; border-radius: 10px; text-align: center; }
        .view-family-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header-box">
        <h2 style="margin:0; color:var(--accent)">شجرة عائلة السني التفاعلية</h2>
    </div>

    <div class="search-container">
        <input type="text" id="familySearch" placeholder="ابحث بالإسم الكامل..." oninput="handleSearch()">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div class="main-grid">
        <div class="branch-card" onclick="openNode('soliman')"><h3>فرع سليمان (الجاك)</h3></div>
        <div class="branch-card" onclick="openNode('othman')"><h3>فرع عثمان (حنان)</h3></div>
        <div class="branch-card" onclick="openNode('mohammed_s')"><h3>فرع محمد (السني)</h3></div>
        <div class="branch-card" onclick="openNode('bat_almona')"><h3>فرع بت المنى</h3></div>
    </div>

    <div class="modal" id="familyModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-nav">
                <button class="back-btn" id="backBtn" onclick="goBack()" style="visibility: hidden;">← رجوع</button>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let navigationHistory = [];

        // القاعدة الذهبية: المفتاح (ID) يجب أن يكون فريداً (مثلاً: الاسم_الاب)
        const familyData = {
            'soliman': { name: 'سليمان (الجاك)', children: ['عمر_soliman', 'الروضة_soliman', 'عبد الغني_soliman', 'فاطمة_soliman', 'نفيسة_soliman', 'النعمة_soliman', 'أم الحسين_soliman', 'مدينة_soliman', 'عبد القيوم_soliman', 'عبد العظيم_soliman'] },
            'othman': { name: 'عثمان (حنان)', children: ['عبد الله_othman', 'زينب_othman', 'محمد_othman', 'فاطمة_othman'] },
            'mohammed_s': { name: 'محمد (السني)', children: ['عباس_mohammed_s', 'بخيت_mohammed_s', 'عوض الله_mohammed_s', 'عبد الرحمن_mohammed_s'] },
            'bat_almona': { name: 'بت المنى', children: ['العوض_bat', 'علي_bat', 'نفيسة_bat', 'مسرة_bat'] },
            
            // تعريف الفروع باستخدام الـ IDs الفريدة
            'omar_soliman': { name: 'عمر سليمان الجاك', partner: 'زينب عثمان (حنان)', children: ['سفيان_omar', 'إشراقة_omar', 'هويدا_omar', 'سيف الدين_omar', 'شمس الدين_omar', 'حيدر_omar', 'نادية_omar', 'رفيدة_omar', 'اعتدال_omar', 'رقية_omar', 'أمل_omar'] },
            'abdullah_othman': { name: 'عبد الله عثمان حنان', children: ['المعز_abdullah', 'مجدي_abdullah', 'محمد_abdullah', 'منذر_abdullah', 'رحاب_abdullah', 'رانيا_abdullah', 'رندا_abdullah', 'ريان_abdullah'] },
            'abbas_mohammed_s': { name: 'عباس محمد السني', children: ['نازك_abbas', 'محمد_abbas', 'مهند_abbas', 'مصطفى_abbas', 'مهتدي_abbas'] },
            
            // العوائل المرتبطة بالأزواج
            'hashem_saleh': { name: 'هاشم صالح علي', partner: 'إشراقة عمر سليمان', children: ['نادر_hashem', 'ريم_hashem', 'رؤى_hashem', 'رزان_hashem'] },
            'abdelmalek_فضيل': { name: 'عبد الملك محمد علي فضيل', partner: 'اعتدال عمر سليمان', children: ['محمد_abdelmalek'] },
            'mohammed_khair': { name: 'محمد خير عبد الرحمن', partner: 'هويدا عمر سليمان', children: ['عامر_m', 'أحمد_m', 'أواب_m', 'أنس_m', 'زينب_m', 'مصطفى_m'] },

            // تعريف الأمهات كروابط (Unique IDs)
            'ishraga_omar': { name: 'إشراقة عمر سليمان', partner: 'هاشم صالح علي', isMother: true, partnerId: 'hashem_saleh' },
            'zeinab_othman': { name: 'زينب عثمان حنان', partner: 'عمر سليمان الجاك', isMother: true, partnerId: 'omar_soliman' },
            'etidal_omar': { name: 'اعتدال عمر سليمان', partner: 'عبد الملك فضيل', isMother: true, partnerId: 'abdelmalek_فضيل' },
            'fatima_soliman': { name: 'فاطمة سليمان الجاك', partner: 'محمد علي فضيل', isMother: true, partnerId: 'abdelmalek_فضيل' },
            'nfisa_soliman': { name: 'نفيسة سليمان الجاك', partner: 'صالح علي أبوالحسن', isMother: true, partnerId: 'hashem_saleh' },
            'hweida_omar': { name: 'هويدا عمر سليمان', partner: 'محمد خير عبد الرحمن', isMother: true, partnerId: 'mohammed_khair' }
        };

        // وظيفة التنظيف والتحويل للبحث
        function norm(t) { return t ? t.replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/[ىي]/g, "ي").trim() : ""; }

        function handleSearch() {
            const input = document.getElementById('familySearch');
            const resBox = document.getElementById('searchResults');
            const q = norm(input.value);
            if (q.length < 2) { resBox.style.display = 'none'; return; }
            
            let matches = [];
            for (let id in familyData) {
                const p = familyData[id];
                if (norm(p.name).includes(q)) matches.push({ n: p.name, id: id });
            }
            
            if (matches.length > 0) {
                resBox.innerHTML = matches.slice(0, 10).map(m => `<div class="search-item" onclick="selectSearch('${m.id}')">${m.n}</div>`).join('');
                resBox.style.display = 'block';
            } else { resBox.style.display = 'none'; }
        }

        function selectSearch(id) { 
            document.getElementById('searchResults').style.display = 'none'; 
            document.getElementById('familySearch').value = ""; 
            openNode(id); 
        }

        function openNode(id, save = true) {
            const p = familyData[id];
            if (!p) return;

            if (save) navigationHistory.push(id);
            updateBackButton();
            
            let displayName = p.name.split('_')[0]; // عرض الاسم بدون الـ ID
            let h = `<h2 style="color:var(--accent); margin-top:0;">${displayName}</h2>`;
            h += `<div class="partner-box"><strong>الزوج / الزوجة:</strong> ${p.partner || 'غير مسجل'}</div>`;
            
            if (p.isMother && p.partnerId) {
                h += `<p>الأبناء مسجلون تحت اسم الأب:</p>`;
                h += `<button class="view-family-btn" onclick="openNode('${p.partnerId}')">عرض أبناء ${p.partner} 📁</button>`;
            } else if (p.children && p.children.length > 0) {
                h += `<h3>الأبناء:</h3><div class="child-list">`;
                p.children.forEach(cId => {
                    // تحسين: عرض الاسم الحقيقي للمستخدم والاحتفاظ بـ ID للضغط
                    let cleanName = cId.split('_')[0]; 
                    if (familyData[cId]) {
                        h += `<div class="child-item has-branch" onclick="openNode('${cId}')">${cleanName} ←</div>`;
                    } else {
                        h += `<div class="child-item no-branch">${cleanName}</div>`;
                    }
                });
                h += `</div>`;
            } else {
                h += `<p style="text-align:center; color:var(--text-muted); padding:20px;">لا توجد فروع مسجلة لـ ${displayName}.</p>`;
            }
            
            document.getElementById('modalBody').innerHTML = h;
            document.getElementById('familyModal').style.display = 'flex';
        }

        function goBack() { 
            if (navigationHistory.length > 1) { 
                navigationHistory.pop(); 
                openNode(navigationHistory[navigationHistory.length - 1], false); 
            } 
        }

        function updateBackButton() { document.getElementById('backBtn').style.visibility = navigationHistory.length > 1 ? 'visible' : 'hidden'; }
        function closeModal() { document.getElementById('familyModal').style.display = 'none'; navigationHistory = []; }
        document.addEventListener('click', (e) => { if (!e.target.closest('.search-container')) document.getElementById('searchResults').style.display = 'none'; });
    </script>
</body>
</html>
