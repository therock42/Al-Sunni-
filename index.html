<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شجرة عائلة السني - بحث يدوي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header-box { text-align: center; background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 800px; margin-bottom: 20px; }

        /* منطقة البحث */
        .search-wrapper { width: 100%; max-width: 500px; margin-bottom: 30px; position: relative; z-index: 5000; }
        #familySearch { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; outline: none; font-family: 'Tajawal'; font-size: 1rem; box-sizing: border-box; }

        /* قائمة الاقتراحات - لا تفتح المودال أبداً بشكل تلقائي */
        .suggestions { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border-radius: 0 0 12px 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-height: 250px; overflow-y: auto; 
            display: none; border: 1px solid #eee; margin-top: 2px;
        }
        .sugg-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f8fafc; text-align: right; }
        .sugg-item:hover { background: #eff6ff; color: var(--accent); }

        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 900px; }
        .branch-card { background: white; padding: 20px; border-radius: 15px; cursor: pointer; text-align: center; border: 1px solid #e2e8f0; font-weight: bold; }

        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; max-height: 75vh; overflow-y: auto; position: relative; }
        .modal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { background: #f1f5f9; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; display: none; }
        .close-btn { border: none; background: #fee2e2; color: #dc2626; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }
        
        .child-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .child-item { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #eee; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-box">
        <h2 style="margin:0; color:var(--accent)">عائلة السني</h2>
        <p style="color:#64748b;">اكتب الاسم واختر من القائمة المنسدلة</p>
    </div>

    <div class="search-wrapper">
        <input type="text" id="familySearch" placeholder="ابحث عن اسم..." oninput="showSuggestions(this.value)" autocomplete="off">
        <div id="suggestionsBox" class="suggestions"></div>
    </div>

    <div class="main-grid">
        <div class="branch-card" onclick="openModal('soliman')">سليمان (الجاك)</div>
        <div class="branch-card" onclick="openModal('othman')">عثمان (حنان)</div>
        <div class="branch-card" onclick="openModal('mohammed_s')">محمد (السني)</div>
        <div class="branch-card" onclick="openModal('bat_almona')">بت المنى</div>
    </div>

    <div class="modal" id="familyModal">
        <div class="modal-content">
            <div class="modal-nav">
                <button class="back-btn" id="backBtn" onclick="goBack()">← رجوع</button>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let navHistory = [];

        const familyData = {
            'soliman': { name: 'سليمان (الجاك)', children: [{name:'فاطمة'}, {name:'عمر', id:'omar_s'}, {name:'نفيسة'}, {name:'النعمة'}, {name:'الروضة', id:'rawda_s'}, {name:'عبد الغني', id:'abdelghani_s'}] },
            'omar_s': { name: 'عمر سليمان الجاك', children: [{name:'سفيان'}, {name:'إشراقة'}, {name:'هويدا', id:'hweida_o'}] },
            'hweida_o': { name: 'هويدا عمر سليمان', children: [{name:'أنس'}, {name:'عامر'}, {name:'أحمد'}] },
            'rawda_s': { name: 'الروضة سليمان الجاك', children: [] },
            'abdelghani_s': { name: 'عبد الغني سليمان الجاك', children: [] },
            'othman': { name: 'عثمان (حنان)', children: [{name:'زينب'}, {name:'محمد'}, {name:'عبد الله', id:'abd_othman'}] },
            'abd_othman': { name: 'عبد الله عثمان حنان', children: [{name:'المعز'}, {name:'مجدي'}, {name:'محمد'}, {name:'منذر'}, {name:'رحاب'}, {name:'رانيا'}, {name:'رندا'}, {name:'ريان'}] },
            'mohammed_s': { name: 'محمد (السني)', children: [{name:'عباس', id:'abbas_s'}] },
            'abbas_s': { name: 'عباس محمد السني', children: [{name:'نازك'}, {name:'محمد'}, {name:'مهند'}, {name:'مصطفي'}, {name:'مهتدي'}] },
            'bat_almona': { name: 'بت المنى', children: [{name:'العوض'}, {name:'على'}] }
        };

        function normalize(t) { return t.replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/[ىي]/g, "ي").trim(); }

        // هذه الدالة تعرض الاقتراحات فقط ولا تفتح أي صفحة
        function showSuggestions(val) {
            const box = document.getElementById('suggestionsBox');
            const query = normalize(val);
            if (query.length < 1) { box.style.display = 'none'; return; }

            let matches = [];
            for (let id in familyData) {
                if (normalize(familyData[id].name).includes(query)) matches.push({ n: familyData[id].name, id: id });
                familyData[id].children.forEach(c => {
                    if (normalize(c.name).includes(query)) matches.push({ n: c.name, id: c.id || id });
                });
            }

            if (matches.length > 0) {
                box.innerHTML = matches.slice(0, 10).map(m => `<div class="sugg-item" onclick="selectFromSearch('${m.id}', '${m.n}')">${m.n}</div>`).join('');
                box.style.display = 'block';
            } else { box.style.display = 'none'; }
        }

        // لا تفتح الصفحة إلا هنا (عند النقر اليدوي)
        function selectFromSearch(id, name) {
            document.getElementById('suggestionsBox').style.display = 'none';
            document.getElementById('familySearch').value = name;
            openModal(id);
        }

        function openModal(id, save = true) {
            const person = familyData[id]; if (!person) return;
            if (save) navHistory.push(id);
            document.getElementById('backBtn').style.display = navHistory.length > 1 ? 'block' : 'none';
            let html = `<h3>${person.name}</h3><div class="child-list">`;
            person.children.forEach(c => {
                html += `<div class="child-item" onclick="${c.id ? `openModal('${c.id}')` : ''}">${c.name} ${c.id ? '←' : ''}</div>`;
            });
            document.getElementById('modalBody').innerHTML = html + `</div>`;
            document.getElementById('familyModal').style.display = 'flex';
        }

        function goBack() { navHistory.pop(); openModal(navHistory[navHistory.length - 1], false); }
        function closeModal() { document.getElementById('familyModal').style.display = 'none'; navHistory = []; document.getElementById('familySearch').value = ""; }
        
        window.onclick = function(e) { 
            if (!e.target.matches('#familySearch')) document.getElementById('suggestionsBox').style.display = 'none';
            if (e.target.id === 'familyModal') closeModal();
        }
    </script>
</body>
</html>
