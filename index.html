<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل عائلة السني - النسخة النهائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --gold: #b45309; --bg: #f1f5f9; --card-bg: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 600px; margin: auto; }
        .header-box { text-align: center; margin-bottom: 25px; }
        .full-lineage { font-size: 0.75rem; color: var(--gold); background: #fef3c7; padding: 10px; border-radius: 15px; border: 1px solid #fde68a; margin-top: 10px; display: block; }
        .search-section { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-family: inherit; outline: none; box-sizing: border-box; }
        .results-box { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 1000; display: none; max-height: 250px; overflow-y: auto; }
        .res-item { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { background: #f1f5f9; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #64748b; }
        .name-title { font-size: 24px; font-weight: 800; color: var(--accent); text-align: center; margin-bottom: 20px; }
        .section-title { font-size: 13px; font-weight: 700; color: #94a3b8; margin: 15px 0 8px; display: block; border-right: 3px solid #e2e8f0; padding-right: 8px; }
        .item-row { background: #f8fafc; padding: 14px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .item-row:hover { background: #f0f7ff; border-color: var(--accent); }
        .tag { background: #dcfce7; color: #166534; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2 style="margin:0">سجل عائلة السني</h2>
        <span class="full-lineage">أحمد (السني) محمد بشير الحاج حسن علي محمد أبو حليمة</span>
    </div>

    <div class="search-section">
        <input type="text" id="searchInput" placeholder="ابحث عن فرد..." oninput="doSearch(this.value)">
        <div id="results" class="results-box"></div>
    </div>

    <div id="displayCard" class="card"></div>
</div>

<script>
const familyData = [
    { id: 'sani', name: 'أحمد (السني)', p: null },
    // الأقطاب
    { id: 'soliman', name: 'سليمان (الجاك)', p: 'sani' },
    { id: 'othman', name: 'عثمان (حنان)', p: 'sani' },
    { id: 'mohammed_s', name: 'محمد (السني)', p: 'sani' },
    { id: 'bat_almona', name: 'بت المنى', p: 'sani' },

    // فرع سليمان
    { id: 'omar_s', name: 'عمر سليمان', p: 'soliman' },
    { id: 'alniama_s', name: 'النعمة سليمان', p: 'soliman' },
    { id: 'abdelazim_s', name: 'عبد العظيم سليمان', p: 'soliman' },
    { id: 'nefisa_s', name: 'نفيسة سليمان', p: 'soliman' },
    { id: 'madina_s', name: 'مدينة سليمان', p: 'soliman' },
    
    // أبناء عمر سليمان وزينب عثمان
    { id: 'shams_o', name: 'شمس الدين عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'haidar_o', name: 'حيدر عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'seif_o', name: 'سيف الدين عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'sofian_o', name: 'سفيان عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'ishraga_o', name: 'إشراقة عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'rofaida_o', name: 'رفيدة عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'etidal_o', name: 'اعتدال عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'rokia_o', name: 'رقية عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'amal_o', name: 'أمل عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'howaida_o', name: 'هويدا عمر سليمان', p: 'omar_s', m: 'zeinab_o' },

    // جيل الأحفاد (أبناء أبناء عمر)
    { id: 'sjood_h', name: 'سجود حيدر عمر', p: 'haidar_o' },
    { id: 'twasul_h', name: 'توسل حيدر عمر', p: 'haidar_o' },
    { id: 'alaa_s', name: 'آلاء سيف الدين عمر', p: 'seif_o' },
    { id: 'isra_s', name: 'إسراء سيف الدين عمر', p: 'seif_o' },

    // فرع النعمة سليمان وعبدالله محمد صالح
    { id: 'mohammed_a', name: 'محمد عبدالله محمد صالح', p: 'abdullah_m', m: 'alniama_s' },
    { id: 'iqbal_a', name: 'إقبال عبدالله محمد صالح', p: 'abdullah_m', m: 'alniama_s' },
    { id: 'mohi_a', name: 'محي الدين عبدالله', p: 'abdullah_m', m: 'alniama_s' },
    { id: 'abulgasim_a', name: 'أبوالقاسم عبدالله', p: 'abdullah_m', m: 'alniama_s' },
    
    // فرع عبدالعظيم سليمان
    { id: 'hatim_a', name: 'حاتم عبد العظيم سليمان', p: 'abdelazim_s' },
    { id: 'walid_a', name: 'وليد عبد العظيم سليمان', p: 'abdelazim_s' },
    { id: 'nihal_a', name: 'نهال عبد العظيم سليمان', p: 'abdelazim_s' },

    // الروابط والزيجات (أطراف أخرى)
    { id: 'zeinab_o', name: 'زينب عثمان (حنان)', p: 'othman' },
    { id: 'mohammed_o', name: 'محمد عثمان (حنان)', p: 'othman' },
    { id: 'abdullah_m', name: 'عبدالله محمد صالح', p: null },
    { id: 'hashem_s', name: 'هاشم صالح علي', p: 'saleh_ali', m: 'nefisa_s' },
    { id: 'reem_h', name: 'ريم هاشم صالح علي', p: 'hashem_s', m: 'ishraga_o' },
    { id: 'saleh_ali', name: 'صالح علي أبو الحسن', p: null }
];

let historyStack = [];

const Engine = {
    normalize: (t) => t.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').trim(),
    
    getPartner: (p) => {
        return familyData.find(x => 
            familyData.some(c => (c.p === p.id && c.m === x.id) || (c.m === p.id && c.p === x.id))
        );
    }
};

function render(id, push = true) {
    const p = familyData.find(x => x.id === id);
    if (!p) return;
    if (push) historyStack.push(id);

    const father = familyData.find(x => x.id === p.p);
    const mother = familyData.find(x => x.id === p.m);
    const partner = Engine.getPartner(p);
    const children = familyData.filter(x => x.p === p.id || x.m === p.id);
    const siblings = familyData.filter(x => x.p === p.p && x.m === p.m && x.id !== p.id && x.p !== null);

    let html = `
        <div class="nav-bar">
            ${historyStack.length > 1 ? `<button class="back-btn" onclick="goBack()">← السابق</button>` : '<div></div>'}
            <span style="font-size:11px; color:#cbd5e1">سجل رقم: ${p.id}</span>
        </div>
        <div class="name-title">${p.name}</div>
    `;

    if (father || mother) {
        html += `<span class="section-title">الوالدين</span>`;
        if (father) html += `<div class="item-row" onclick="render('${father.id}')"><span style="color:#64748b">الأب</span><b>${father.name}</b></div>`;
        if (mother) html += `<div class="item-row" onclick="render('${mother.id}')"><span style="color:#64748b">الأم</span><b>${mother.name}</b></div>`;
    }

    if (partner) {
        html += `<span class="section-title">الشريك (الزوج/ة)</span>
                 <div class="item-row" style="border-right: 4px solid var(--accent)" onclick="render('${partner.id}')">
                    <b>${partner.name}</b> <span class="tag">انقر للتفاصيل</span>
                 </div>`;
    }

    if (siblings.length) {
        html += `<span class="section-title">الأخوة</span>`;
        siblings.forEach(s => html += `<div class="item-row" onclick="render('${s.id}')"><b>${s.name}</b></div>`);
    }

    if (children.length) {
        html += `<span class="section-title">الأبناء (${children.length})</span>`;
        children.forEach(c => html += `<div class="item-row" onclick="render('${c.id}')"><b>${c.name}</b><span>←</span></div>`);
    }

    const card = document.getElementById('displayCard');
    card.innerHTML = html;
    card.style.display = 'block';
    document.getElementById('results').style.display = 'none';
    document.getElementById('searchInput').value = '';
}

function doSearch(v) {
    const r = document.getElementById('results');
    if (v.length < 2) { r.style.display = 'none'; return; }
    const q = Engine.normalize(v);
    const matches = familyData.filter(x => Engine.normalize(x.name).includes(q));
    r.innerHTML = matches.map(m => `<div class="res-item" onclick="render('${m.id}')">${m.name}</div>`).join('');
    r.style.display = matches.length ? 'block' : 'none';
}

function goBack() {
    historyStack.pop();
    render(historyStack.pop());
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-section')) document.getElementById('results').style.display = 'none';
});
</script>
</body>
</html>
