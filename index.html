<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سجل عائلة السني الكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #1e40af; --bg: #f8fafc; --card: #ffffff; --gold: #b45309; --emerald: #059669; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: all 0.2s; }
        body { background-color: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; color: var(--primary); }
        .header { text-align: center; margin-bottom: 25px; }
        .full-lineage { font-size: 0.8rem; color: var(--gold); background: #fef3c7; padding: 8px 15px; border-radius: 20px; border: 1px solid #fde68a; }
        .search-container { width: 100%; max-width: 480px; position: relative; margin: 20px 0; }
        #familySearch { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 16px; outline: none; text-align: center; }
        .search-results { position: absolute; top: 110%; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 2000; max-height: 300px; overflow-y: auto; display: none; border: 1px solid #e2e8f0; }
        .search-item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; justify-content: space-between; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 550px; }
        .branch-card { background: var(--card); padding: 20px; border-radius: 16px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(4px); padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 480px; max-height: 90vh; border-radius: 24px; padding: 25px; overflow-y: auto; }
        .person-name { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-bottom: 15px; text-align: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .info-section { background: #f0f7ff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 4px solid var(--accent); }
        .relation-tag { color: var(--emerald); font-weight: bold; font-size: 0.85rem; }
        .child-box { background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #f1f5f9; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .clickable { cursor: pointer; background: #fff; border-color: #cbd5e1; }
        .clickable:hover { border-color: var(--accent); }
        .btn-link { background: var(--primary); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .back-btn { background: #f1f5f9; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>سجل عائلة السني</h2>
        <div class="full-lineage">أحمد (السني) محمد بشير الحاج حسن علي محمد أبو حليمة</div>
    </div>

    <div class="search-container">
        <input type="text" id="familySearch" placeholder="ابحث عن اسم..." oninput="handleSearch(this.value)">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div class="main-grid">
        <div class="branch-card" onclick="openModal('soliman')">سليمان (الجاك)</div>
        <div class="branch-card" onclick="openModal('othman')">عثمان (حنان)</div>
        <div class="branch-card" onclick="openModal('mohammed_s')">محمد (السني)</div>
        <div class="branch-card" onclick="openModal('bat_almona')">بت المنى</div>
    </div>

    <div class="modal" id="familyModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="back-btn" id="backBtn" onclick="goBack()" style="visibility: hidden;">← السابق</button>
            <div id="modalBody"></div>
        </div>
    </div>

<script>
    const familyData = {
        // الفروع الرئيسية
        'soliman': { name: 'سليمان (الجاك)', children: [{name:'عمر', id:'omar_s'}, {name:'النعمة', id:'alniama_s'}, {name:'عبد العظيم', id:'abdelazim_s'}, {name:'نفيسة', id:'nefisa_s'}, {name:'مدينة', id:'madina_s'}, {name:'عبد القيوم'}, {name:'فاطمة'}, {name:'أم الحسين'}, {name:'الروضة'}] },
        'othman': { name: 'عثمان (حنان)', children: [{name:'محمد', id:'mohammed_o'}, {name:'زينب', id:'zeinab_o'}] },
        'mohammed_s': { name: 'محمد (السني)', children: [{name:'عباس'}, {name:'بخيت'}] },
        'bat_almona': { name: 'بت المنى', children: [{name:'علي'}] },

        // تفاصيل فرع عمر سليمان
        'omar_s': { 
            name: 'عمر سليمان (الجاك)', partner: 'زينب عثمان (حنان)', relation: 'ابنة خاله', partnerId: 'zeinab_o',
            children: [{name:'شمس الدين'}, {name:'حيدر', id:'haidar_o'}, {name:'سيف الدين', id:'seif_o'}, {name:'سفيان', id:'sofian_o'}, {name:'إشراقة', id:'ishraga_o'}, {name:'نادية'}, {name:'رفيدة', id:'rofaida_o'}, {name:'اعتدال', id:'etidal_o'}, {name:'رقية', id:'rokia_o'}, {name:'أمل', id:'amal_o'}, {name:'هويدا', id:'howaida_o'}] 
        },
        'haidar_o': { name: 'حيدر عمر سليمان', partner: 'نجلاء عبدالله القمر', children: [{name:'سجود'}, {name:'توسل'}, {name:'محمد'}, {name:'عمر'}, {name:'أحمد'}, {name:'منة الله'}, {name:'جود'}] },
        'seif_o': { name: 'سيف الدين عمر سليمان', partner: 'أميرة التهامي', children: [{name:'آلاء'}, {name:'إسراء'}, {name:'محمد'}, {name:'أحمد'}, {name:'تنزيل'}] },
        'sofian_o': { name: 'سفيان عمر سليمان', partner: 'إقبال عبدالله محمد صالح', relation: 'ابنة عمته', partnerId: 'iqbal_a', children: [{name:'أمل'}, {name:'آية'}, {name:'تسنيم'}] },
        'rokia_o': { name: 'رقية عمر سليمان', partner: 'محمد عبدالله محمد صالح', relation: 'ابن عمتها', partnerId: 'mohammed_a', children: [{name:'امتثال'}, {name:'عبير'}, {name:'إيمان'}] },
        'ishraga_o': { name: 'إشراقة عمر سليمان', partner: 'هاشم صالح علي', relation: 'ابن عمتها', partnerId: 'hashem_s' },

        // تفاصيل فرع النعمة
        'alniama_s': { name: 'النعمة سليمان (الجاك)', partner: 'عبدالله محمد صالح', children: [{name:'محمد', id:'mohammed_a'}, {name:'إقبال', id:'iqbal_a'}, {name:'محي الدين', id:'mohi_a'}, {name:'أبوالقاسم', id:'abulgasim_a'}, {name:'فايزة'}, {name:'سعاد'}] },
        'mohammed_a': { name: 'محمد عبدالله محمد صالح', partner: 'رقية عمر سليمان', partnerId: 'rokia_o' },
        'iqbal_a': { name: 'إقبال عبدالله محمد صالح', partner: 'سفيان عمر سليمان', partnerId: 'sofian_o' },

        // تفاصيل فرع نفيسة
        'nefisa_s': { name: 'نفيسة سليمان (الجاك)', partner: 'صالح علي أبو الحسن', children: [{name:'هاشم', id:'hashem_s'}, {name:'كمال'}, {name:'حسن'}] },
        'hashem_s': { name: 'هاشم صالح علي', partner: 'إشراقة عمر سليمان', partnerId: 'ishraga_o', children: [{name:'نادر'}, {name:'ريم', id:'reem_h'}, {name:'رؤى'}] },
        'reem_h': { name: 'ريم هاشم صالح علي', partner: 'حاتم عبد العظيم سليمان', partnerId: 'hatim_a' },

        // تفاصيل فرع عبد العظيم
        'abdelazim_s': { name: 'عبد العظيم سليمان (الجاك)', partner: 'هلالة بت المسور', children: [{name:'حاتم', id:'hatim_a'}, {name:'وليد'}, {name:'منال'}, {name:'نهال'}] },
        'hatim_a': { name: 'حاتم عبد العظيم سليمان', partner: 'ريم هاشم صالح علي', partnerId: 'reem_h' },

        // تفاصيل فرع عثمان
        'zeinab_o': { name: 'زينب عثمان (حنان)', partner: 'عمر سليمان (الجاك)', partnerId: 'omar_s' },
        'madina_s': { name: 'مدينة سليمان (الجاك)', partner: 'محمد عثمان (حنان)', partnerId: 'mohammed_o' },
        'mohammed_o': { name: 'محمد عثمان (حنان)', partner: 'مدينة سليمان (الجاك)', children: [{name:'أميمة'}, {name:'نهلة'}, {name:'نجلاء'}] }
    };

    let history = [];

    function openModal(id, save = true) {
        const p = familyData[id]; if (!p) return;
        if (save) history.push(id);
        document.getElementById('backBtn').style.visibility = history.length > 1 ? 'visible' : 'hidden';
        
        let h = `<div class="person-name">${p.name}</div>`;
        if (p.partner) {
            h += `<div class="info-section"><strong>الزوج/ة:</strong> ${p.partner} 
            ${p.relation ? `<span class="relation-tag">(${p.relation})</span>` : ''}
            ${p.partnerId ? `<button class="btn-link" onclick="openModal('${p.partnerId}')">سجل الشريك 🔗</button>` : ''}</div>`;
        }
        if (p.children) {
            h += `<strong>الأبناء:</strong><br>` + p.children.map(c => `
                <div class="child-box ${c.id ? 'clickable' : ''}" onclick="${c.id ? `openModal('${c.id}')` : ''}">
                    ${c.name} ${c.id ? '<span>←</span>' : ''}
                </div>`).join('');
        } else if (!p.partner) {
            h += `<p style="text-align:center; color:#94a3b8;">لا توجد بيانات إضافية مسجلة.</p>`;
        }
        
        document.getElementById('modalBody').innerHTML = h;
        document.getElementById('familyModal').style.display = 'flex';
    }

    function handleSearch(q) {
        const r = document.getElementById('searchResults');
        if (q.length < 2) { r.style.display = 'none'; return; }
        const matches = Object.keys(familyData).filter(k => familyData[k].name.includes(q));
        r.innerHTML = matches.map(k => `<div class="search-item" onclick="openModal('${k}')">${familyData[k].name} 🔍</div>`).join('');
        r.style.display = matches.length ? 'block' : 'none';
    }

    function goBack() { history.pop(); openModal(history.pop()); }
    function closeModal() { document.getElementById('familyModal').style.display = 'none'; history = []; }
</script>
</body>
</html>
