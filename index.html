<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شجرة عائلة السني - النسخة المستقرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f1f5f9; --card-bg: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header-box { text-align: center; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 800px; margin-bottom: 20px; }
        
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 100%; max-width: 900px; }
        .branch-card { background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; text-align: center; border: 1px solid #e2e8f0; transition: 0.3s; font-weight: bold; }
        .branch-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 550px; max-height: 80vh; overflow-y: auto; position: relative; }
        
        .modal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .back-btn { background: #f1f5f9; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-family: 'Tajawal'; font-weight: bold; display: none; }
        .close-btn { border: none; background: #fee2e2; color: #dc2626; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }

        .child-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .child-item { background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; cursor: pointer; text-align: center; transition: 0.2s; }
        .child-item:hover { background: #eff6ff; border-color: var(--accent); }
        .has-link { font-weight: bold; color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="header-box">
        <h2 style="margin:0; color:var(--accent)">شجرة عائلة السني التفاعلية</h2>
        <p>تصفح الفروع والأجيال بسهولة</p>
    </div>

    <div class="main-grid">
        <div class="branch-card" onclick="openModal('soliman')">فرع سليمان (الجاك)</div>
        <div class="branch-card" onclick="openModal('othman')">فرع عثمان (حنان)</div>
        <div class="branch-card" onclick="openModal('mohammed_s')">فرع محمد (السني)</div>
        <div class="branch-card" onclick="openModal('bat_almona')">فرع بت المنى</div>
    </div>

    <div class="modal" id="familyModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-nav">
                <button class="back-btn" id="backBtn" onclick="goBack()">← عودة</button>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let navHistory = [];

        const familyData = {
            'soliman': {
                name: 'سليمان (الجاك)',
                children: [
                    { name: 'فاطمة' }, { name: 'عمر', id: 'omar_s' },
                    { name: 'نفيسة' }, { name: 'النعمة' },
                    { name: 'أم الحسين' }, { name: 'الروضة', id: 'rawda_s' },
                    { name: 'عبد الغني', id: 'abdelghani_s' }, { name: 'مدينة' },
                    { name: 'عبد القيوم' }, { name: 'عبد العظيم' }
                ]
            },
            'omar_s': {
                name: 'عمر سليمان الجاك',
                children: [
                    { name: 'سفيان' }, { name: 'إشراقة' }, { name: 'هويدا', id: 'hweida_o' },
                    { name: 'سيف الدين' }, { name: 'شمس الدين' }, { name: 'حيدر' }
                ]
            },
            'hweida_o': {
                name: 'هويدا عمر سليمان',
                children: [{ name: 'أنس' }, { name: 'عامر' }, { name: 'أحمد' }, { name: 'أواب' }, { name: 'زينب' }, { name: 'مصطفى' }]
            },
            'rawda_s': { name: 'الروضة سليمان الجاك', children: [] },
            'abdelghani_s': { name: 'عبد الغني سليمان الجاك', children: [] },
            'othman': {
                name: 'عثمان (حنان)',
                children: [{ name: 'زينب' }, { name: 'محمد' }, { name: 'فاطمة' }, { name: 'عبد الله', id: 'abd_othman' }]
            },
            'abd_othman': {
                name: 'عبد الله عثمان حنان',
                children: [
                    { name: 'المعز' }, { name: 'مجدي' }, { name: 'محمد' }, { name: 'منذر' },
                    { name: 'رحاب' }, { name: 'رانيا' }, { name: 'رندا' }, { name: 'ريان' }
                ]
            },
            'mohammed_s': {
                name: 'محمد (السني)',
                children: [{ name: 'بخيت' }, { name: 'عوض الله' }, { name: 'عباس', id: 'abbas_s' }, { name: 'عبد الرحمن' }]
            },
            'abbas_s': {
                name: 'عباس محمد السني',
                children: [{ name: 'نازك' }, { name: 'محمد' }, { name: 'مهند' }, { name: 'مصطفي' }, { name: 'مهتدي' }]
            },
            'bat_almona': {
                name: 'بت المنى',
                children: [{ name: 'العوض' }, { name: 'على' }, { name: 'نفيسة' }, { name: 'مسرة' }]
            }
        };

        function openModal(id, saveHistory = true) {
            const person = familyData[id];
            if (!person) return;

            if (saveHistory) navHistory.push(id);
            
            const backBtn = document.getElementById('backBtn');
            backBtn.style.display = navHistory.length > 1 ? 'block' : 'none';

            let html = `<h2 style="color:var(--accent); margin-top:0;">${person.name}</h2>`;
            if (person.children && person.children.length > 0) {
                html += `<h3>الأبناء:</h3><div class="child-list">`;
                person.children.forEach(c => {
                    html += `<div class="child-item ${c.id ? 'has-link' : ''}" onclick="${c.id ? `openModal('${c.id}')` : ''}">
                        ${c.name} ${c.id ? '←' : ''}
                    </div>`;
                });
                html += `</div>`;
            } else {
                html += `<p style="color:#64748b">لا توجد فروع إضافية مسجلة حالياً.</p>`;
            }

            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('familyModal').style.display = 'flex';
        }

        function goBack() {
            if (navHistory.length > 1) {
                navHistory.pop(); // حذف الحالي
                const previousId = navHistory[navHistory.length - 1];
                openModal(previousId, false); // فتح السابق بدون حفظه مرة أخرى
            }
        }

        function closeModal() {
            document.getElementById('familyModal').style.display = 'none';
            navHistory = []; // تصفير التاريخ عند الإغلاق تماماً
        }
    </script>
</body>
</html>
