<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سجل عائلة السني - النسخة الشاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #1e40af; --bg: #f8fafc; --card: #ffffff; --text-muted: #64748b; --gold: #b45309; --emerald: #059669; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--primary); }
        .header { text-align: center; width: 100%; margin-bottom: 25px; }
        .full-lineage { font-size: 0.8rem; color: var(--gold); background: #fef3c7; padding: 8px 15px; border-radius: 20px; display: inline-block; border: 1px solid #fde68a; line-height: 1.4; }
        .search-container { width: 100%; max-width: 480px; position: relative; margin: 20px 0; }
        #familySearch { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 16px; outline: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: white; text-align: center; }
        .search-results { position: absolute; top: 110%; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); z-index: 2000; max-height: 350px; overflow-y: auto; display: none; border: 1px solid #e2e8f0; }
        .search-item { padding: 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 550px; }
        .branch-card { background: var(--card); padding: 25px 10px; border-radius: 16px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; font-weight: bold; }
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(4px); padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 480px; max-height: 85vh; border-radius: 24px; padding: 25px; overflow-y: auto; position: relative; }
        .person-name { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .info-section { background: #f8fafc; padding: 18px; border-radius: 15px; margin-bottom: 20px; border-right: 4px solid var(--accent); }
        .section-title { font-size: 0.8rem; color: var(--text-muted); font-weight: bold; margin-bottom: 10px; display: block; }
        .relation-text { color: var(--emerald); font-weight: normal; font-size: 0.9rem; margin-right: 5px; }
        .child-box { background: white; padding: 12px; border-radius: 10px; border: 1px solid #f1f5f9; display: flex; justify-content: space-between; margin-bottom: 8px; cursor: pointer; align-items: center; }
        .btn-link { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .close-x { position: absolute; top: 15px; left: 15px; font-size: 22px; cursor: pointer; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="header">
        <h2>سجل عائلة السني</h2>
        <div class="full-lineage">أحمد (السني) محمد بشير الحاج حسن علي محمد أبو حليمة</div>
    </div>

    <div class="search-container">
        <input type="text" id="familySearch" placeholder="البحث في شجرة العائلة..." oninput="handleSmartSearch(this.value)">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div class="main-grid">
        <div class="branch-card" onclick="openModal('soliman')">سليمان (الجاك)</div>
        <div class="branch-card" onclick="openModal('othman')">عثمان (حنان)</div>
        <div class="branch-card" onclick="openModal('mohammed_s')">محمد (السني)</div>
        <div class="branch-card" onclick="openModal('bat_almona')">بت المنى</div>
    </div>

    <div class="modal" id="familyModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-x" onclick="closeModal()">✕</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const familyData = {
            'soliman': { name: 'سليمان (الجاك)', children: [{ name: 'عمر', id: 'omar_s' }, { name: 'النعمة', id: 'alniama_s' }, { name: 'عبد العظيم', id: 'abdelazim_s' }, { name: 'عبد القيوم', id: 'abdelgayoum_s' }, { name: 'نفيسة', id: 'nefisa_s' }, { name: 'مدينة', id: 'madina_s' }, { name: 'فاطمة', id: 'fatima_s' }, { name: 'أم الحسين', id: 'omhussain_s' }, { name: 'الروضة', id: 'rowda_s' }] },

            // فرع عمر
            'omar_s': { 
                name: 'عمر سليمان (الجاك)', partner: 'زينب عثمان (حنان)', relation: 'ابنة خاله', partnerId: 'zeinab_o',
                children: [{ name: 'سفيان', id: 'sofian_o' }, { name: 'رقية', id: 'rokia_o' }, { name: 'إشراقة', id: 'ishraga_o' }, { name: 'حيدر', id: 'haidar_o' }, { name: 'سيف الدين' }, { name: 'شمس الدين' }, { name: 'نادية' }, { name: 'رفيدة' }, { name: 'اعتدال', id: 'etidal_o' }, { name: 'أمل' }, { name: 'هويدا', id: 'howaida_o' }] 
            },
            'sofian_o': { name: 'سفيان عمر سليمان', partner: 'إقبال عبدالله محمد صالح', relation: 'ابنة عمته', partnerId: 'iqbal_a', children: [{ name: 'أمل' }, { name: 'آية' }, { name: 'تسنيم' }, { name: 'نون' }, { name: 'تسابيح' }] },
            'rokia_o': { name: 'رقية عمر سليمان', partner: 'محمد عبدالله محمد صالح', relation: 'ابن عمتها', partnerId: 'mohammed_a', children: [{ name: 'امتثال' }, { name: 'عبير' }, { name: 'إيمان' }, { name: 'أحمد' }] },
            'etidal_o': { name: 'اعتدال عمر سليمان', partner: 'عبدالملك محمد علي فضيل', children: [{ name: 'محمد' }, { name: 'مصطفى' }] },
            'howaida_o': { name: 'هويدا عمر سليمان', partner: 'محمد خير عبدالرحمن', children: [{ name: 'عامر' }, { name: 'أحمد' }, { name: 'أنس' }, { name: 'أواب' }, { name: 'مصطفى' }, { name: 'زينب' }] },
            'haidar_o': { name: 'حيدر عمر سليمان', partner: 'نجلاء عبدالله القمر', children: [{ name: 'سجود' }, { name: 'توسل' }, { name: 'محمد' }, { name: 'عمر' }] },
            'ishraga_o': { name: 'إشراقة عمر سليمان', partner: 'هاشم صالح علي', relation: 'ابن عمتها', partnerId: 'hashem_s', isLinkOnly: true },

            // فرع النعمة
            'alniama_s': { 
                name: 'النعمة سليمان (الجاك)', partner: 'عبدالله محمد صالح', 
                children: [{ name: 'محمد', id: 'mohammed_a' }, { name: 'إقبال', id: 'iqbal_a' }, { name: 'محي الدين', id: 'mohi_a' }, { name: 'أبوالقاسم', id: 'abulgasim_a' }, { name: 'فايزة' }, { name: 'سعاد' }] 
            },
            'mohi_a': { name: 'محي الدين عبدالله محمد صالح', partner: 'شيماء بخيت', children: [{ name: 'مزن' }, { name: 'آسر' }] },
            'abulgasim_a': { name: 'أبوالقاسم عبدالله محمد صالح', partner: 'رميساء عبدالرحمن', children: [{ name: 'عبدالله' }, { name: 'يسرا' }, { name: 'يمنى' }] },
            'mohammed_a': { name: 'محمد عبدالله محمد صالح', partner: 'رقية عمر سليمان', relation: 'ابنة عمه', partnerId: 'rokia_o', isLinkOnly: true },
            'iqbal_a': { name: 'إقبال عبدالله محمد صالح', partner: 'سفيان عمر سليمان', relation: 'ابن عمتها', partnerId: 'sofian_o', isLinkOnly: true },

            // فرع عبد العظيم
            'abdelazim_s': { 
                name: 'عبد العظيم سليمان (الجاك)', partner: 'هلالة بت المسور', 
                children: [{ name: 'حاتم', id: 'hatim_a' }, { name: 'وليد', id: 'walid_a' }, { name: 'منال', id: 'manal_a' }, { name: 'نهال', id: 'nihal_a' }, { name: 'أبوبكر' }, { name: 'ملاذ' }, { name: 'مروة' }] 
            },
            'hatim_a': { name: 'حاتم عبد العظيم سليمان', partner: 'ريم هاشم صالح علي', relation: 'ابنة بنت عمة والده', partnerId: 'reem_h', children: [{ name: 'محمد' }, { name: 'ريناد' }] },
            'walid_a': { name: 'وليد عبد العظيم سليمان', partner: 'ثويبة', children: [{ name: 'دانية' }, { name: 'أحمد' }] },
            'nihal_a': { name: 'نهال عبد العظيم سليمان', partner: 'مروان', children: [{ name: 'يزيد' }, { name: 'مشعل' }] },
            'manal_a': { name: 'منال عبد العظيم سليمان', partner: 'فتحي' },
            'reem_h': { name: 'ريم هاشم صالح علي', partner: 'حاتم عبد العظيم سليمان', relation: 'ابن عمها', partnerId: 'hatim_a', isLinkOnly: true },

            // البقية
            'abdelgayoum_s': { name: 'عبد القيوم سليمان (الجاك)' },
            'fatima_s': { name: 'فاطمة سليمان (الجاك)' },
            'omhussain_s': { name: 'أم الحسين سليمان (الجاك)' },
            'rowda_s': { name: 'الروضة سليمان (الجاك)' },
            'madina_s': { name: 'مدينة سليمان (الجاك)', partner: 'محمد عثمان (حنان)', partnerId: 'mohammed_o' },
            'mohammed_o': { name: 'محمد عثمان (حنان)', partner: 'مدينة سليمان (الجاك)', partnerId: 'madina_s', children: [{ name: 'أميمة' }, { name: 'نهلة' }, { name: 'نجلاء' }] },
            'nefisa_s': { name: 'نفيسة سليمان (الجاك)', partner: 'صالح علي أبو الحسن', children: [{ name: 'هاشم', id: 'hashem_s' }] },
            'hashem_s': { name: 'هاشم صالح علي', partner: 'إشراقة عمر سليمان', relation: 'ابنة خاله', partnerId: 'ishraga_o', children: [{ name: 'نادر' }, { name: 'ريم', id: 'reem_h' }, { name: 'رؤى' }, { name: 'رزان' }] },
            'zeinab_o': { name: 'زينب عثمان (حنان)', partner: 'عمر سليمان (الجاك)', relation: 'ابن عمتها', partnerId: 'omar_s', isLinkOnly: true },
            'othman': { name: 'عثمان (حنان)', children: [{ name: 'محمد', id: 'mohammed_o' }, { name: 'زينب', id: 'zeinab_o' }, { name: 'عبدالله' }, { name: 'حسن' }, { name: 'هلالة' }] },
            'mohammed_s': { name: 'محمد (السني)', children: [{ name: 'عباس' }, { name: 'بخيت' }] },
            'bat_almona': { name: 'بت المنى (السني)', children: [{ name: 'علي' }, { name: 'العوض' }] }
        };

        function openModal(id) {
            const p = familyData[id]; if (!p) return;
            let h = `<div class="person-name">${p.name}</div>`;
            if (p.partner) {
                h += `<div class="info-section"><span class="section-title">بيانات الشريك</span><strong>الزوج/ة:</strong> ${p.partner} ${p.relation ? `<span class="relation-text">(${p.relation})</span>` : ''}${p.partnerId ? `<br><button class="btn-link" onclick="openModal('${p.partnerId}')">عرض سجل الشريك 🔗</button>` : ''}</div>`;
            }
            if (p.isLinkOnly) {
                h += `<p style="font-size:0.9rem; color:var(--text-muted); text-align:center;">التفاصيل والأبناء موثقون في سجل الشريك.</p>`;
            } else if (p.children) {
                h += `<span class="section-title">الأبناء</span><div class="child-list">${p.children.map(c => `<div class="child-box" onclick="${c.id ? `openModal('${c.id}')` : ''}"><span>${c.name}</span>${c.id ? '<span style="color:var(--accent); font-size:11px;">عرض ←</span>' : ''}</div>`).join('')}</div>`;
            }
            document.getElementById('modalBody').innerHTML = h;
            document.getElementById('familyModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('familyModal').style.display = 'none'; }
        function handleSmartSearch(query) {
            const resDiv = document.getElementById('searchResults');
            if (query.trim().length < 2) { resDiv.style.display = 'none'; return; }
            let results = Object.keys(familyData).filter(k => familyData[k].name.includes(query));
            if (results.length > 0) {
                resDiv.innerHTML = results.map(k => `<div class="search-item" onclick="openModal('${k}')"><span>${familyData[k].name}</span><small>فتح</small></div>`).join('');
                resDiv.style.display = 'block';
            } else { resDiv.style.display = 'none'; }
        }
        window.onclick = (e) => { if (e.target.id === 'familyModal') closeModal(); }
    </script>
</body>
</html>
