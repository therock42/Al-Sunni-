<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سجل عائلة السني الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #1e40af; --bg: #f8fafc; --card: #ffffff; --text-muted: #64748b; --gold: #b45309; --emerald: #059669; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .header { text-align: center; margin-bottom: 30px; }
        .search-container { width: 100%; max-width: 500px; margin: 0 auto 30px; position: relative; }
        #searchInput { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; text-align: center; font-size: 16px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; margin: 0 auto; }
        .branch-card { background: white; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #e2e8f0; font-weight: bold; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 500px; max-height: 85vh; border-radius: 20px; padding: 25px; overflow-y: auto; position: relative; }
        .info-box { background: #f0f7ff; padding: 15px; border-radius: 12px; margin: 15px 0; border-right: 5px solid var(--accent); }
        .relation-badge { background: var(--emerald); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; margin-right: 5px; }
        .child-item { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        .btn-nav { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .close-btn { position: absolute; top: 15px; left: 15px; font-size: 20px; cursor: pointer; color: #94a3b8; }
    </style>
</head>
<body>

<div class="header">
    <h2>سجل عائلة السني الرقمي</h2>
    <div style="color:var(--gold)">نظام الربط الآلي للقرابة</div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="ابحث عن أي فرد في العائلة..." oninput="search(this.value)">
    <div id="results" style="background:white; position:absolute; width:100%; z-index:10; display:none; border:1px solid #eee; border-radius:10px; box-shadow:0 10px 15px rgba(0,0,0,0.1);"></div>
</div>

<div class="main-grid" id="mainBranches">
    </div>

<div class="modal" id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
/**
 * قاعدة البيانات الذهبية: 
 * أضف الأشخاص هنا فقط. الكود سيتكفل بربطهم بآبائهم وزوجاتهم وحساب القرابة.
 */
const familyData = [
    // الجد الأكبر
    { id: "sani", name: "أحمد (السني)", father: null },

    // أبناء السني
    { id: "soliman", name: "سليمان (الجاك)", father: "sani" },
    { id: "othman", name: "عثمان (حنان)", father: "sani" },
    { id: "mohammed_s", name: "محمد (السني)", father: "sani" },
    { id: "bat_almona", name: "بت المنى (السني)", father: "sani" },

    // فرع سليمان
    { id: "omar_s", name: "عمر سليمان (الجاك)", father: "soliman", partner: "زينب عثمان (حنان)" },
    { id: "alniama_s", name: "النعمة سليمان (الجاك)", father: "soliman", partner: "عبدالله محمد صالح" },
    { id: "abdelazim_s", name: "عبد العظيم سليمان (الجاك)", father: "soliman", partner: "هلالة بت المسور" },
    { id: "madina_s", name: "مدينة سليمان (الجاك)", father: "soliman", partner: "محمد عثمان (حنان)" },

    // فرع عثمان
    { id: "zeinab_o", name: "زينب عثمان (حنان)", father: "othman", partner: "عمر سليمان (الجاك)" },
    { id: "mohammed_o", name: "محمد عثمان (حنان)", father: "othman", partner: "مدينة سليمان (الجاك)" },

    // فرع عمر (أحفاد سليمان)
    { id: "sofian_o", name: "سفيان عمر سليمان", father: "omar_s", partner: "إقبال عبدالله محمد صالح" },
    { id: "rokia_o", name: "رقية عمر سليمان", father: "omar_s", partner: "محمد عبدالله محمد صالح" },
    { id: "ishraga_o", name: "إشراقة عمر سليمان", father: "omar_s", partner: "هاشم صالح علي" },
    { id: "seif_o", name: "سيف الدين عمر سليمان", father: "omar_s", partner: "أميرة التهامي" },

    // فرع النعمة (أحفاد سليمان)
    { id: "iqbal_a", name: "إقبال عبدالله محمد صالح", father: "abdullah_m", partner: "سفيان عمر سليمان" },
    { id: "mohammed_a", name: "محمد عبدالله محمد صالح", father: "abdullah_m", partner: "رقية عمر سليمان" },
    { id: "abdullah_m", name: "عبدالله محمد صالح", partner: "النعمة سليمان (الجاك)" },

    // فرع عبد العظيم (أحفاد سليمان)
    { id: "hatim_a", name: "حاتم عبد العظيم سليمان", father: "abdelazim_s", partner: "ريم هاشم صالح علي" },
    
    // فرع هاشم (أبناء نفيسة)
    { id: "reem_h", name: "ريم هاشم صالح علي", father: "hashem_s", partner: "حاتم عبد العظيم سليمان" },
    { id: "hashem_s", name: "هاشم صالح علي", father: "saleh_ali", partner: "إشراقة عمر سليمان" }
];

// --- محرك البحث والعلاقات ---

function findRelation(p1, p2) {
    if (!p1 || !p2 || !p1.father || !p2.father) return "";
    const f1 = familyData.find(x => x.id === p1.father);
    const f2 = familyData.find(x => x.id === p2.father);
    if (!f1 || !f2) return "";
    
    // أولاد عم/خال (آباءهم إخوة)
    if (f1.father === f2.father && f1.id !== f2.id) {
        return "صلة رحم (أولاد عمومة/خؤولة)";
    }
    // يمكن إضافة شروط أكثر دقة هنا مستقبلاً
    return "";
}

function openModal(id) {
    const p = familyData.find(x => x.id === id);
    if (!p) return;

    const children = familyData.filter(x => x.father === id);
    const partnerObj = familyData.find(x => x.name === p.partner);
    const rel = partnerObj ? findRelation(p, partnerObj) : "";

    let html = `<h3 style="margin-top:0">${p.name}</h3>`;
    
    if (p.partner) {
        html += `<div class="info-box">
            <strong>الزوج/ة:</strong> ${p.partner} 
            ${rel ? `<span class="relation-badge">${rel}</span>` : ''}
            ${partnerObj ? `<button class="btn-nav" onclick="openModal('${partnerObj.id}')">انتقل لسجل الشريك 🔗</button>` : ''}
        </div>`;
    }

    if (children.length > 0) {
        html += `<strong>الأبناء (${children.length}):</strong><br><br>`;
        children.forEach(c => {
            html += `<div class="child-item" onclick="openModal('${c.id}')">
                <span>${c.name}</span><span>←</span>
            </div>`;
        });
    } else {
        html += `<p style="color:var(--text-muted); text-align:center;">لا يوجد أبناء مسجلين حالياً.</p>`;
    }

    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modal').style.display = 'flex';
}

function search(query) {
    const resDiv = document.getElementById('results');
    if (query.length < 2) { resDiv.style.display = 'none'; return; }
    const filtered = familyData.filter(x => x.name.includes(query));
    resDiv.innerHTML = filtered.map(x => `<div style="padding:10px; border-bottom:1px solid #eee; cursor:pointer" onclick="openModal('${x.id}')">${x.name}</div>`).join('');
    resDiv.style.display = 'block';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

// عرض الفروع الأساسية (أبناء السني) عند البداية
const mainIds = ["soliman", "othman", "mohammed_s", "bat_almona"];
document.getElementById('mainBranches').innerHTML = mainIds.map(id => {
    const p = familyData.find(x => x.id === id);
    return `<div class="branch-card" onclick="openModal('${id}')">${p.name}</div>`;
}).join('');

</script>
</body>
</html>
