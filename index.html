<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل عائلة السني - النسخة المطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0f172a; 
            --accent: #2563eb; 
            --secondary: #64748b;
            --bg: #f1f5f9; 
            --card-bg: #ffffff;
        }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
            color: var(--primary); 
        }
        .container { max-width: 600px; margin: auto; position: relative; }
        
        /* تصميم صندوق البحث */
        .search-container { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            margin-bottom: 25px; 
        }
        .header-title { 
            margin: 0 0 15px 0; 
            font-size: 1.4rem; 
            text-align: center; 
            color: var(--primary);
        }
        .input-wrapper { position: relative; }
        input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 16px; 
            font-family: inherit;
            outline: none; 
            transition: 0.3s;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        /* نتائج البحث */
        .results { 
            position: absolute; 
            top: 105%; 
            left: 0; 
            right: 0; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            max-height: 300px; 
            overflow-y: auto; 
            z-index: 1000; 
            display: none; 
        }
        .res-item { 
            padding: 12px 20px; 
            border-bottom: 1px solid #f1f5f9; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .res-item:hover { background: #f8fafc; color: var(--accent); }

        /* تصميم البطاقة */
        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            display: none; 
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { 
            background: #f1f5f9; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-family: inherit;
            font-weight: bold;
            color: var(--secondary);
        }
        .back-btn:hover { background: #e2e8f0; }

        .name-header { 
            font-size: 26px; 
            font-weight: 800; 
            color: var(--accent); 
            text-align: center; 
            margin-bottom: 25px;
            line-height: 1.4;
        }
        
        .section-label { 
            font-size: 13px; 
            font-weight: 700; 
            color: var(--secondary); 
            margin: 15px 5px 8px; 
            display: block;
        }

        .info-row { 
            background: #f8fafc; 
            padding: 14px 18px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .info-row:hover { border-color: var(--accent); background: #f0f7ff; }
        
        .label-text { color: #64748b; font-size: 14px; }
        .value-text { font-weight: 600; color: var(--primary); }
        .tag { 
            background: #dcfce7; 
            color: #166534; 
            font-size: 11px; 
            padding: 3px 10px; 
            border-radius: 20px; 
            margin-right: 8px; 
        }
        .empty-state { text-align: center; color: var(--secondary); padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-container">
        <h2 class="header-title">سجل عائلة السني</h2>
        <div class="input-wrapper">
            <input type="text" id="searchInput" placeholder="ابحث عن فرد في العائلة..." oninput="search(this.value)" autocomplete="off">
            <div id="resBox" class="results"></div>
        </div>
    </div>

    <div id="personCard" class="card"></div>
</div>

<script>
// البيانات الأساسية
const familyData = [
    { id: 'sani', name: 'أحمد (السني)', p: null, m: null },
    { id: 'soliman', name: 'سليمان (الجاك)', p: 'sani' },
    { id: 'othman', name: 'عثمان (حنان)', p: 'sani' },
    { id: 'mohammed_s', name: 'محمد (السني)', p: 'sani' },
    { id: 'bat_almona', name: 'بت المنى', p: 'sani' },
    { id: 'omar_s', name: 'عمر سليمان', p: 'soliman' },
    { id: 'alniama_s', name: 'النعمة سليمان', p: 'soliman' },
    { id: 'abdelazim_s', name: 'عبد العظيم سليمان', p: 'soliman' },
    { id: 'nefisa_s', name: 'نفيسة سليمان', p: 'soliman' },
    { id: 'madina_s', name: 'مدينة سليمان', p: 'soliman' },
    { id: 'abdelghayoum_s', name: 'عبد القيوم سليمان', p: 'soliman' },
    { id: 'fatima_s', name: 'فاطمة سليمان', p: 'soliman' },
    { id: 'amhussin_s', name: 'أم الحسين سليمان', p: 'soliman' },
    { id: 'rawda_s', name: 'الروضة سليمان', p: 'soliman' },
    { id: 'zeinab_o', name: 'زينب عثمان', p: 'othman' },
    { id: 'mohammed_o', name: 'محمد عثمان', p: 'othman' },
    { id: 'abbas_ms', name: 'عباس محمد السني', p: 'mohammed_s' },
    { id: 'bakheet_ms', name: 'بخيت محمد السني', p: 'mohammed_s' },
    { id: 'ali_bm', name: 'علي بت المنى', p: 'bat_almona' },
    { id: 'saleh_ali', name: 'صالح علي', p: null },
    { id: 'hashem_s', name: 'هاشم صالح علي', p: 'saleh_ali', m: 'nefisa_s' },
    { id: 'ishraga_o', name: 'إشراقة عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'reem_h', name: 'ريم هاشم', p: 'hashem_s', m: 'ishraga_o' },
    { id: 'abdullah_m', name: 'عبدالله محمد صالح', p: null },
    { id: 'iqbal_a', name: 'إقبال عبدالله', p: 'abdullah_m', m: 'alniama_s' },
    { id: 'sofian_o', name: 'سفيان عمر سليمان', p: 'omar_s', m: 'zeinab_o' },
    { id: 'sofian_kids', name: 'أبناء سفيان وإقبال', p: 'sofian_o', m: 'iqbal_a' }
];

let historyStack = [];

const Engine = {
    // توحيد الحروف العربية للبحث المرن
    normalize: (t) => t ? t.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').trim() : "",
    
    getPartner: (p) => familyData.find(x => 
        familyData.some(c => (c.p === p.id && c.m === x.id) || (c.m === p.id && c.p === x.id))
    ),

    getRelation: (p1, p2) => {
        if (!p1 || !p2 || p1.id === p2.id) return "";
        const f1 = familyData.find(x => x.id === p1.p), m1 = familyData.find(x => x.id === p1.m);
        const f2 = familyData.find(x => x.id === p2.p), m2 = familyData.find(x => x.id === p2.m);
        if (f1 && f2 && f1.p === f2.p && f1.id !== f2.id) return "ود عم / بت عم";
        if (m1 && m2 && m1.p === m2.p && m1.id !== m2.id) return "ود خالة / بت خالة";
        return "";
    }
};

function render(id, pushToHistory = true) {
    const p = familyData.find(x => x.id === id);
    if (!p) return;
    
    if (pushToHistory) historyStack.push(id);
    
    const father = familyData.find(x => x.id === p.p);
    const mother = familyData.find(x => x.id === p.m);
    const partner = Engine.getPartner(p);
    const children = familyData.filter(x => x.p === p.id || x.m === p.id);
    const siblings = familyData.filter(x => x.p === p.p && x.m === p.m && x.id !== p.id && x.p !== null);

    let html = `
        <div class="nav-controls">
            ${historyStack.length > 1 ? `<button class="back-btn" onclick="goBack()">← عودة</button>` : '<div></div>'}
            <span style="font-size:12px; color:#94a3b8">معرف: ${p.id}</span>
        </div>
        <div class="name-header">${p.name}</div>
    `;

    // قسم الوالدين
    if (father || mother) {
        html += `<span class="section-label">الوالدين</span>`;
        if (father) html += `<div class="info-row" onclick="render('${father.id}')"><span class="label-text">الأب</span><span class="value-text">${father.name}</span></div>`;
        if (mother) html += `<div class="info-row" onclick="render('${mother.id}')"><span class="label-text">الأم</span><span class="value-text">${mother.name}</span></div>`;
    }

    // الزوج/ة
    if (partner) {
        const rel = Engine.getRelation(p, partner);
        html += `<span class="section-label">الزوج / الزوجة</span>
                 <div class="info-row" style="background:#eff6ff" onclick="render('${partner.id}')">
                    <span class="value-text">${partner.name} ${rel ? `<span class="tag">${rel}</span>` : ''}</span>
                 </div>`;
    }

    // الأخوة
    if (siblings.length) {
        html += `<span class="section-label">الأخوة</span>`;
        siblings.forEach(s => {
            html += `<div class="info-row" onclick="render('${s.id}')"><span class="value-text">${s.name}</span></div>`;
        });
    }

    // الأبناء
    if (children.length) {
        html += `<span class="section-label">الأبناء (${children.length})</span>`;
        children.forEach(c => {
            html += `<div class="info-row" onclick="render('${c.id}')"><span class="value-text">${c.name}</span></div>`;
        });
    }

    const card = document.getElementById('personCard');
    card.innerHTML = html;
    card.style.display = 'block';
    document.getElementById('resBox').style.display = 'none';
    document.getElementById('searchInput').value = '';
}

function goBack() {
    historyStack.pop(); // الحالي
    const prevId = historyStack.pop(); // السابق
    render(prevId);
}

function search(v) {
    const b = document.getElementById('resBox');
    if (v.length < 1) { b.style.display = 'none'; return; }
    
    const query = Engine.normalize(v);
    const matches = familyData.filter(x => Engine.normalize(x.name).includes(query));
    
    if (matches.length > 0) {
        b.innerHTML = matches.map(m => `<div class="res-item" onclick="render('${m.id}')">${m.name}</div>`).join('');
        b.style.display = 'block';
    } else {
        b.style.display = 'none';
    }
}

// إغلاق النتائج عند النقر خارجها
document.addEventListener('click', (e) => {
    if (!e.target.closest('.input-wrapper')) document.getElementById('resBox').style.display = 'none';
});
</script>

</body>
</html>
