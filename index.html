<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شجرة عائلة السني - المحرك الذكي V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --gold: #b45309; --bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; }
        .header { text-align: center; padding: 10px; }
        .kinship-tool { background: white; border: 2px solid var(--gold); border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { position: relative; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: 'Tajawal'; font-size: 15px; outline: none; }
        .suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 0 0 10px 10px; z-index: 3000; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .suggestion-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .suggestion-item:hover { background: #f0f7ff; color: var(--accent); }
        .btn-check { background: var(--gold); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; }
        #kinshipResult { margin-top: 15px; padding: 15px; border-radius: 12px; background: #fffcf0; border: 1px solid #fde68a; font-size: 1rem; line-height: 1.6; display: none; text-align: center; color: #92400e; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .branch-card { background: white; padding: 20px 5px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--accent); font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
        .modal-content { background: white; width: 100%; max-height: 85vh; border-radius: 25px 25px 0 0; padding: 25px; overflow-y: auto; position: relative; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-btn { background: #fee2e2; color: #dc2626; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2>شجرة عائلة السني التفاعلية</h2>
        <p style="color: #64748b; font-size: 0.85rem;">الآن مع خاصية المصاهرات المتقدمة</p>
    </div>

    <div class="kinship-tool">
        <h4 style="margin:0 0 12px 0; color:var(--gold); text-align:center;">🔍 كاشف صلة القرابة الذكي</h4>
        <div class="input-group">
            <input type="text" id="p1Input" placeholder="ابحث عن الاسم الأول (رباعياً)..." oninput="showSuggest(this, 'sugg1')" autocomplete="off">
            <div id="sugg1" class="suggestions"></div>
        </div>
        <div class="input-group">
            <input type="text" id="p2Input" placeholder="ابحث عن الاسم الثاني (رباعياً)..." oninput="showSuggest(this, 'sugg2')" autocomplete="off">
            <div id="sugg2" class="suggestions"></div>
        </div>
        <button class="btn-check" onclick="traceKinship()">تحليل صلة القرابة</button>
        <div id="kinshipResult"></div>
    </div>

    <div class="main-grid">
        <div class="branch-card" onclick="openModal('soliman')">سليمان (الجاك)</div>
        <div class="branch-card" onclick="openModal('othman')">عثمان (حنان)</div>
    </div>

    <div class="modal" id="familyModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 id="modalTitle" style="margin:0; color:var(--accent);"></h3>
                <button onclick="closeModal()" class="close-btn">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // قاعدة البيانات المحدثة بربط المصاهرة
        const familyData = {
            'soliman': { name: 'سليمان (الجاك)', children: ['omar_s', 'nefisa_s', 'neama_s', 'madina_s'] },
            'othman': { name: 'عثمان (حنان)', children: ['mohammed_o', 'zeinab_o'] },
            
            // فرع عمر
            'omar_s': { name: 'عمر سليمان (الجاك)', parent: 'soliman', partner: 'زينب عثمان', children: ['seif_o', 'shams_o', 'haidar_o', 'ishraga_o', 'hweida_o'] },
            'ishraga_o': { name: 'إشراقة عمر سليمان (الجاك)', parent: 'omar_s', partner: 'هاشم صالح علي ابوالحسن', partnerId: 'hashem_s' },
            'hweida_o': { name: 'هويدا عمر سليمان (الجاك)', parent: 'omar_s', partner: 'محمد خير عبدالرحمن', children: ['anas_h'] },
            
            // فرع نفيسة
            'nefisa_s': { name: 'نفيسة سليمان (الجاك)', parent: 'soliman', partner: 'صالح علي ابوالحسن', children: ['hashem_s', 'abdelhafiz_s'] },
            'hashem_s': { name: 'هاشم صالح علي ابوالحسن', parent: 'nefisa_s', partner: 'إشراقة عمر سليمان (الجاك)', partnerId: 'ishraga_o', children: ['nader_h', 'reem_h'] },
            
            // الأبناء (الجيل الجديد)
            'nader_h': { name: 'نادر هاشم صالح علي ابوالحسن', parent: 'hashem_s' },
            'reem_h': { name: 'ريم هاشم صالح علي ابوالحسن', parent: 'hashem_s' },
            'anas_h': { name: 'أنس محمد خير عبدالرحمن', parent: 'hweida_o' },
            
            'zeinab_o': { name: 'زينب عثمان (حنان)', parent: 'othman', partner: 'عمر سليمان (الجاك)', partnerId: 'omar_s' },
            'neama_s': { name: 'النعمة سليمان (الجاك)', parent: 'soliman', children: ['mohammed_a'] },
            'mohammed_a': { name: 'محمد عبدالله احمد صالح', parent: 'neama_s' }
        };

        function normalize(t) { return t ? t.replace(/[أإآا]/g, "ا").replace(/[ةه]/g, "ه").replace(/\s+/g, "") : ""; }

        function showSuggest(input, suggId) {
            const div = document.getElementById(suggId);
            const val = normalize(input.value);
            if (val.length < 2) { div.style.display = 'none'; return; }
            
            let html = "";
            for (let id in familyData) {
                if (normalize(familyData[id].name).includes(val)) {
                    html += `<div class="suggestion-item" onclick="selectSugg('${id}', '${familyData[id].name}', '${input.id}', '${suggId}')">${familyData[id].name}</div>`;
                }
            }
            if (html) { div.innerHTML = html; div.style.display = 'block'; }
            else { div.style.display = 'none'; }
        }

        function selectSugg(id, name, inputId, suggId) {
            const input = document.getElementById(inputId);
            input.value = name;
            input.dataset.selectedId = id;
            document.getElementById(suggId).style.display = 'none';
        }

        function traceKinship() {
            const id1 = document.getElementById('p1Input').dataset.selectedId;
            const id2 = document.getElementById('p2Input').dataset.selectedId;
            const res = document.getElementById('kinshipResult');

            if (!id1 || !id2) { res.innerHTML = "⚠️ يرجى اختيار الأسماء من القائمة المقترحة."; res.style.display = 'block'; return; }
            if (id1 === id2) { res.innerHTML = "هذا هو نفس الشخص!"; res.style.display = 'block'; return; }

            const p1 = familyData[id1]; const p2 = familyData[id2];
            let msg = "توجد صلة قرابة (صهر أو من فروع متباعدة).";

            // 1. الزواج
            if (p1.partnerId === id2 || p2.partnerId === id1) {
                msg = `❤️ <strong>${p1.name}</strong> و <strong>${p2.name}</strong> زوجان.`;
            }
            // 2. الوالد والابن
            else if (p1.parent === id2) msg = `👨‍👩‍👧‍👦 <strong>${p2.name}</strong> هو (والد/والدة) <strong>${p1.name}</strong>`;
            else if (p2.parent === id1) msg = `👨‍👩‍👧‍👦 <strong>${p1.name}</strong> هو (والد/والدة) <strong>${p2.name}</strong>`;
            
            // 3. الإخوة
            else if (p1.parent && p1.parent === p2.parent) msg = `🤝 <strong>${p1.name}</strong> و <strong>${p2.name}</strong> إخوة.`;
            
            // 4. الخال والعم (ذكاء إضافي)
            else {
                const parent1 = familyData[p1.parent];
                const parent2 = familyData[p2.parent];
                
                if (parent1 && parent1.parent === p2.parent) msg = `👤 <strong>${p2.name}</strong> هو (خال/عم) <strong>${p1.name}</strong>`;
                else if (parent2 && parent2.parent === p1.parent) msg = `👤 <strong>${p1.name}</strong> هو (خال/عم) <strong>${p2.name}</strong>`;
                else if (parent1 && parent2 && parent1.parent === parent2.parent) msg = `🔗 <strong>${p1.name}</strong> و <strong>${p2.name}</strong> أبناء عمومة أو خؤولة.`;
            }

            // حالة هاشم وإشراقة الخاصة لأبنائهم
            if ((id1 === 'hashem_s' && id2 === 'ishraga_o') || (id1 === 'ishraga_o' && id2 === 'hashem_s')) {
                msg = `💍 <strong>${familyData.hashem_s.name}</strong> هو زوج <strong>${familyData.ishraga_o.name}</strong>.`;
            }

            res.innerHTML = msg;
            res.style.display = 'block';
        }

        function closeModal() { document.getElementById('familyModal').style.display = 'none'; }
        function openModal(id) {
            const p = familyData[id];
            document.getElementById('modalTitle').innerText = p.name;
            let h = "";
            if (p.partner) h += `<p style="background:#f0f7ff; padding:10px; border-radius:10px;"><strong>الزوج/ة:</strong> ${p.partner}</p>`;
            if (p.children && p.children.length > 0) {
                h += `<h4>الأبناء:</h4>`;
                p.children.forEach(cid => {
                    const child = familyData[cid];
                    h += `<div onclick="openModal('${cid}')" style="padding:12px; border:1px solid #eee; margin-bottom:8px; border-radius:8px; cursor:pointer; background:#fff;">${child ? child.name : cid} ${child ? '←' : ''}</div>`;
                });
            } else { h += `<p style="color:#999; text-align:center;">لا توجد فروع مسجلة لهذا الشخص حالياً.</p>`; }
            document.getElementById('modalBody').innerHTML = h;
            document.getElementById('familyModal').style.display = 'flex';
        }
    </script>
</body>
</html>
