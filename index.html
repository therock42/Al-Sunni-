<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سجل عائلة السني الرقمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #1e40af; --bg: #f8fafc; --card: #ffffff; --text-muted: #64748b; --gold: #b45309; --emerald: #059669; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--primary); }
        .header { text-align: center; width: 100%; margin-bottom: 30px; }
        .header h2 { color: var(--primary); font-size: 1.8rem; margin-bottom: 5px; font-weight: 700; }
        .full-lineage { font-size: 0.85rem; color: var(--gold); background: #fef3c7; padding: 6px 18px; border-radius: 20px; display: inline-block; margin-top: 5px; border: 1px solid #fde68a; line-height: 1.4; }
        .search-container { width: 100%; max-width: 480px; position: relative; margin: 30px 0; }
        #familySearch { width: 100%; padding: 16px 25px; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 16px; outline: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: white; text-align: center; }
        .search-results { position: absolute; top: 110%; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); z-index: 2000; max-height: 350px; overflow-y: auto; display: none; border: 1px solid #e2e8f0; }
        .search-item { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; justify-content: space-between; align-items: center; text-align: right; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 550px; }
        .branch-card { background: var(--card); padding: 25px 10px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); text-align: center; border: 1px solid #e2e8f0; cursor: pointer; display: flex; flex-direction: column; justify-content: center; }
        .branch-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .branch-name { font-weight: 400; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 4px; }
        .branch-title { font-weight: 700; font-size: 1.2rem; color: var(--primary); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; max-height: 85vh; border-radius: 20px; padding: 25px; overflow-y: auto; position: relative; }
        .modal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }
        .back-btn { background: #f1f5f9; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #94a3b8; }
        
        /* تصميم صلة القرابة */
        .partner-box { background: #f0f7ff; padding: 18px; border-radius: 12px; margin-bottom: 20px; border-right: 4px solid var(--accent); position: relative; }
        .relation-tag { font-size: 0.75rem; background: var(--emerald); color: white; padding: 2px 10px; border-radius: 10px; margin-right: 8px; font-weight: normal; vertical-align: middle; }
        
        .section-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; font-weight: bold; }
        .child-item { background: #ffffff; padding: 15px; border-radius: 10px; border: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 8px; }
        .btn-jump { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>سجل عائلة السني</h2>
        <div class="full-lineage">أحمد (السني) محمد بشير الحاج حسن علي محمد أبو حليمة</div>
    </div>

    <div class="search-container">
        <input type="text" id="familySearch" placeholder="البحث في شجرة العائلة..." oninput="handleSmartSearch(this.value)">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div class="main-grid">
        <div class="branch-card" onclick="openModal('soliman')">
            <span class="branch-name">فرع سليمان</span>
            <span class="branch-title">الجاك</span>
        </div>
        <div class="branch-card" onclick="openModal('othman')">
            <span class="branch-name">فرع عثمان</span>
            <span class="branch-title">حنان</span>
        </div>
        <div class="branch-card" onclick="openModal('mohammed_s')">
            <span class="branch-name">فرع محمد</span>
            <span class="branch-title">السني</span>
        </div>
        <div class="branch-card" onclick="openModal('bat_almona')">
            <span class="branch-name">فرع</span>
            <span class="branch-title">بت المنى (السني)</span>
        </div>
    </div>

    <div class="modal" id="familyModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-nav">
                <button class="back-btn" id="backBtn" onclick="goBack()" style="visibility: hidden;">السابق</button>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let navHistory = [];
        
        // قاعدة البيانات مع إضافة حقل 'relation' (صلة القرابة)
        const familyData = {
            'soliman': { name: 'سليمان (الجاك)', children: [{ name: 'عمر', id: 'omar_s' }, { name: 'النعمة', id: 'alniama_s' }, { name: 'نفيسة', id: 'nefisa_s' }, { name: 'مدينة', id: 'madina_s' }, { name: 'فاطمة' }, { name: 'أم الحسين' }, { name: 'الروضة' }, { name: 'عبد القيوم' }, { name: 'عبد العظيم' }] },
            
            'alniama_s': { 
                name: 'النعمة سليمان (الجاك)', 
                partner: 'عبدالله محمد صالح', 
                children: [
                    { name: 'محمد (زوج رقية)', id: 'rokia_o' }, 
                    { name: 'محي الدين', id: 'mohi_a' }, 
                    { name: 'أبوالقاسم', id: 'abulgasim_a' }, 
                    { name: 'فايزة' }, 
                    { name: 'إقبال (زوجة سفيان)', id: 'sofian_o' }, 
                    { name: 'سعاد' }
                ] 
            },

            'omar_s': { 
                name: 'عمر سليمان (الجاك)', 
                partner: 'زينب عثمان (حنان)', 
                relation: 'ابنة خاله', // علاقة زينب بعمر
                partnerId: 'zeinab_o', 
                children: [
                    { name: 'شمس الدين', id: 'shams_o' }, { name: 'حيدر', id: 'haidar_o' }, 
                    { name: 'سيف الدين', id: 'seif_o' }, { name: 'سفيان', id: 'sofian_o' }, 
                    { name: 'إشراقة', id: 'ishraga_o' }, { name: 'نادية', id: 'nadia_o' }, 
                    { name: 'رفيدة', id: 'rofaida_o' }, { name: 'اعتدال', id: 'etidal_o' }, 
                    { name: 'رقية', id: 'rokia_o' }, { name: 'أمل', id: 'amal_o' }, { name: 'هويدا', id: 'howaida_o' }
                ] 
            },

            'sofian_o': { 
                name: 'سفيان عمر سليمان (الجاك)', 
                partner: 'إقبال عبدالله محمد صالح', 
                relation: 'ابنة عمته', // إقبال ابنة النعمة (عمة سفيان)
                children: [{ name: 'أمل' }, { name: 'آية' }, { name: 'تسنيم' }, { name: 'نون' }, { name: 'تسابيح' }] 
            },

            'rokia_o': { 
                name: 'رقية عمر سليمان (الجاك)', 
                partner: 'محمد عبدالله محمد صالح', 
                relation: 'ابن عمتها', // محمد ابن النعمة (عمة رقية)
                children: [{ name: 'امتثال' }, { name: 'عبير' }, { name: 'إيمان' }, { name: 'أحمد' }] 
            },

            'zeinab_o': { name: 'زينب عثمان (حنان)', partner: 'عمر سليمان (الجاك)', relation: 'ابن عمتها', partnerId: 'omar_s', isLinkOnly: true },
            
            'etidal_o': { name: 'اعتدال عمر سليمان (الجاك)', partner: 'عبدالملك محمد علي فضيل', children: [{ name: 'محمد' }, { name: 'مصطفى' }] },
            'howaida_o': { name: 'هويدا عمر سليمان (الجاك)', partner: 'محمد خير عبدالرحمن', children: [{ name: 'عامر' }, { name: 'أحمد' }, { name: 'أنس' }, { name: 'أواب' }, { name: 'مصطفى' }, { name: 'زينب' }] },
            'haidar_o': { name: 'حيدر عمر سليمان (الجاك)', partner: 'نجلاء عبدالله القمر', children: [{ name: 'سجود' }, { name: 'توسل' }, { name: 'محمد' }, { name: 'عمر' }, { name: 'أحمد' }, { name: 'منة الله' }, { name: 'جود' }] },
            'seif_o': { name: 'سيف الدين عمر سليمان (الجاك)', partner: 'أميرة التهامي', children: [{ name: 'آلاء' }, { name: 'إسراء' }, { name: 'محمد' }, { name: 'أحمد' }, { name: 'تنزيل' }] },
            'nadia_o': { name: 'نادية عمر سليمان (الجاك)', partner: 'إبراهيم الصافي' },
            'rofaida_o': { name: 'رفيدة عمر سليمان (الجاك)', partner: 'سليمان خضر', children: [{ name: 'شهد' }, { name: 'صفاء' }, { name: 'التاج' }, { name: 'مدثر' }, { name: 'سيف الدين' }, { name: 'وعد' }] },
            'amal_o': { name: 'أمل عمر سليمان (الجاك)', partner: 'يوسف التهامي', children: [{ name: 'حفية' }, { name: 'مآب' }] },
            'abulgasim_a': { name: 'أبوالقاسم عبدالله محمد صالح', partner: 'رميساء عبدالرحمن', children: [{ name: 'عبدالله' }, { name: 'يسرا' }, { name: 'يمنى' }] },
            'mohi_a': { name: 'محي الدين عبدالله محمد صالح', partner: 'شيماء بخيت', children: [{ name: 'مزن' }, { name: 'آسر' }] },
            'othman': { name: 'عثمان (حنان)', children: [{ name: 'محمد', id: 'mohammed_o' }, { name: 'عبدالله' }, { name: 'حسن' }, { name: 'زينب', id: 'zeinab_o' }, { name: 'هلالة' }] },
            'mohammed_s': { name: 'محمد (السني)', children: [{ name: 'عباس' }, { name: 'بخيت' }] },
            'bat_almona': { name: 'بت المنى (السني)', children: [{ name: 'العوض' }, { name: 'علي' }] },
            'mohammed_o': { name: 'محمد عثمان (حنان)', partner: 'مدينة سليمان (الجاك)', partnerId: 'madina_s', children: [{ name: 'أميمة' }, { name: 'نهلة' }, { name: 'نجلاء' }] },
            'madina_s': { name: 'مدينة سليمان (الجاك)', partner: 'محمد عثمان (حنان)', partnerId: 'mohammed_o', isLinkOnly: true },
            'nefisa_s': { name: 'نفيسة سليمان (الجاك)', partner: 'صالح علي أبو الحسن', partnerId: 'saleh_ali', isLinkOnly: true },
            'saleh_ali': { name: 'صالح علي أبو الحسن', partner: 'نفيسة سليمان (الجاك)', children: [{ name: 'هاشم', id: 'hashem_s' }, { name: 'فتاح' }, { name: 'التجاني' }, { name: 'معتصم' }, { name: 'عبدالحفيظ' }, { name: 'سيدأحمد' }, { name: 'حسن' }, { name: 'كمال' }, { name: 'بخيتة' }, { name: 'أميرة' }, { name: 'منيرة' }] },
            'hashem_s': { name: 'هاشم صالح علي', partner: 'إشراقة عمر سليمان (الجاك)', partnerId: 'ishraga_o', children: [{ name: 'نادر' }, { name: 'ريم' }, { name: 'رؤى' }, { name: 'رزان' }] },
            'ishraga_o': { name: 'إشراقة عمر سليمان (الجاك)', partner: 'هاشم صالح علي', partnerId: 'hashem_s', isLinkOnly: true },
            'shams_o': { name: 'شمس الدين عمر سليمان (الجاك)', children: [{ name: 'سحر' }, { name: 'محمد' }] }
        };

        function normalizeArabic(text) {
            if (!text) return "";
            return text.replace(/[أإآا]/g, "ا").replace(/[ىي]/g, "ي").replace(/[ةه]/g, "ه").replace(/[\u064B-\u065F]/g, "").trim().toLowerCase();
        }

        function handleSmartSearch(query) {
            const resDiv = document.getElementById('searchResults');
            const q = normalizeArabic(query);
            if (!q || query.length < 2) { resDiv.style.display = 'none'; return; }
            let results = [];
            Object.keys(familyData).forEach(key => {
                const p = familyData[key];
                if (normalizeArabic(p.name).includes(q)) results.push({ id: key, name: p.name, info: 'سجل العائلة' });
                if (p.children) {
                    p.children.forEach(c => {
                        if (normalizeArabic(c.name + " " + p.name).includes(q)) {
                            if (!results.some(r => r.name === c.name)) results.push({ id: c.id || key, name: c.name, info: `فرع ${p.name}` });
                        }
                    });
                }
            });
            if (results.length > 0) {
                resDiv.innerHTML = results.slice(0, 10).map(r => `
                    <div class="search-item" onclick="openModal('${r.id}')">
                        <div><strong>${r.name}</strong><br><small style="color:var(--text-muted)">${r.info}</small></div>
                        <span>←</span>
                    </div>
                `).join('');
                resDiv.style.display = 'block';
            } else { resDiv.style.display = 'none'; }
        }

        function openModal(id, save = true) {
            const p = familyData[id]; if (!p) return;
            if (save) navHistory.push(id);
            updateBack();
            let h = `<h3 style="margin:0 0 15px 0; color:var(--primary); font-size:1.2rem;">${p.name}</h3>`;
            
            if (p.partner) {
                // الجزء الذكي لعرض صلة القرابة
                const relationSpan = p.relation ? `<span class="relation-tag">${p.relation}</span>` : "";
                h += `<div class="section-title">بيانات الشريك</div>
                      <div class="partner-box">
                        <strong>الزوج/ة:</strong> ${p.partner} ${relationSpan}
                      </div>`;
            }

            if (p.isLinkOnly) {
                h += `<p style="font-size:0.9rem; color:var(--text-muted);">الأبناء والبيانات التفصيلية موثقون في سجل الشريك.</p>`;
                h += `<button class="btn-jump" onclick="openModal('${p.partnerId}')">انتقل لسجل الشريك 🔗</button>`;
            } else if (p.children) {
                h += `<div class="section-title">الأبناء</div><div class="child-list">`;
                p.children.forEach(c => {
                    h += `<div class="child-item" onclick="${c.id ? `openModal('${c.id}')` : ''}">
                        <span>${c.name}</span> ${c.id ? '<span style="color:var(--accent)">←</span>' : ''}
                    </div>`;
                });
                h += `</div>`;
            }
            document.getElementById('modalBody').innerHTML = h;
            document.getElementById('familyModal').style.display = 'flex';
            document.getElementById('searchResults').style.display = 'none';
        }

        function goBack() { if (navHistory.length > 1) { navHistory.pop(); openModal(navHistory[navHistory.length - 1], false); } }
        function updateBack() { document.getElementById('backBtn').style.visibility = navHistory.length > 1 ? 'visible' : 'hidden'; }
        function closeModal() { document.getElementById('familyModal').style.display = 'none'; navHistory = []; updateBack(); }
        window.onclick = (e) => { if (e.target.id === 'familyModal') closeModal(); }
    </script>
</body>
</html>
