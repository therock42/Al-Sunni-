<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شجرة عائلة السني - النسخة النظيفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e293b; --accent: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 20px; }
        
        /* البحث الذكي الثابت */
        .search-container { width: 100%; max-width: 500px; margin-bottom: 30px; position: relative; z-index: 1000; }
        #searchInput { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; outline: none; font-family: 'Tajawal'; }
        .sugg-box { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 0 0 12px 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; max-height: 200px; overflow-y: auto; }
        .sugg-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .sugg-item:hover { background: #f0f7ff; }

        /* الشبكة الرئيسية */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; max-width: 900px; }
        .card { background: white; padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: bold; border: 1px solid #e2e8f0; }

        /* النافذة المنبثقة */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { background: #f1f5f9; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; visibility: hidden; }
        .btn-close { border: none; background: #fee2e2; color: #dc2626; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }
        
        .list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item { background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #eee; text-align: center; cursor: pointer; }
        .link { font-weight: bold; color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color:var(--primary)">شجرة عائلة السني</h2>
        <p style="color:#64748b">الروضة وعبدالغني فروع مستقلة</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="ابحث عن اسم..." oninput="doSearch(this.value)" autocomplete="off">
        <div id="suggBox" class="sugg-box"></div>
    </div>

    <div class="grid">
        <div class="card" onclick="openNode('soliman')">سليمان (الجاك)</div>
        <div class="card" onclick="openNode('othman')">عثمان (حنان)</div>
        <div class="card" onclick="openNode('mohammed_s')">محمد (السني)</div>
        <div class="card" onclick="openNode('bat_almona')">بت المنى</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="btn-back" id="btnBack" onclick="goBack()">← عودة</button>
                <button class="btn-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let history = [];
        const family = {
            'soliman': { n: 'سليمان (الجاك)', c: [{n:'فاطمة'}, {n:'عمر', id:'omar'}, {n:'نفيسة'}, {n:'النعمة'}, {n:'الروضة', id:'rawda'}, {n:'عبد الغني', id:'ghani'}] },
            'omar': { n: 'عمر سليمان الجاك', c: [{n:'سفيان'}, {n:'إشراقة'}, {n:'هويدا', id:'hweida'}] },
            'hweida': { n: 'هويدا عمر سليمان', c: [{n:'أنس'}, {name:'عامر'}, {n:'أحمد'}] },
            'rawda': { n: 'الروضة سليمان الجاك', c: [] },
            'ghani': { n: 'عبد الغني سليمان الجاك', c: [] },
            'othman': { n: 'عثمان (حنان)', c: [{n:'زينب'}, {n:'محمد'}, {n:'عبد الله', id:'abdullah'}] },
            'abdullah': { n: 'عبد الله عثمان حنان', c: [{n:'المعز'}, {n:'مجدي'}, {n:'محمد'}, {n:'منذر'}, {n:'رحاب'}] },
            'mohammed_s': { n: 'محمد (السني)', c: [{n:'عباس', id:'abbas'}] },
            'abbas': { n: 'عباس محمد السني', c: [{n:'نازك'}, {n:'محمد'}, {n:'مهند'}, {n:'مصطفى'}] },
            'bat_almona': { n: 'بت المنى', c: [{n:'العوض'}, {n:'على'}] }
        };

        function norm(t) { return t.replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/[ىي]/g, "ي").trim(); }

        function doSearch(val) {
            const box = document.getElementById('suggBox');
            const q = norm(val);
            if (q.length < 1) { box.style.display = 'none'; return; }
            let res = [];
            for (let id in family) {
                if (norm(family[id].n).includes(q)) res.push({n: family[id].n, id: id});
                family[id].c.forEach(child => {
                    if (norm(child.n).includes(q)) res.push({n: child.n, id: child.id || id});
                });
            }
            if (res.length > 0) {
                box.innerHTML = res.slice(0, 8).map(r => `<div class="sugg-item" onclick="select('${r.id}')">${r.n}</div>`).join('');
                box.style.display = 'block';
            } else { box.style.display = 'none'; }
        }

        function select(id) {
            document.getElementById('suggBox').style.display = 'none';
            document.getElementById('searchInput').value = "";
            openNode(id);
        }

        function openNode(id, save = true) {
            const p = family[id]; if (!p) return;
            if (save) history.push(id);
            document.getElementById('btnBack').style.visibility = history.length > 1 ? 'visible' : 'hidden';
            let html = `<h3>${p.n}</h3><div class="list">`;
            p.c.forEach(child => {
                html += `<div class="item ${child.id ? 'link' : ''}" onclick="${child.id ? `openNode('${child.id}')` : ''}">${child.n} ${child.id ? '←' : ''}</div>`;
            });
            document.getElementById('modalBody').innerHTML = html + `</div>`;
            document.getElementById('modal').style.display = 'flex';
        }

        function goBack() { history.pop(); openNode(history[history.length - 1], false); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; history = []; }
        window.onclick = e => { if (e.target.id === 'modal') closeModal(); if (!e.target.matches('#searchInput')) document.getElementById('suggBox').style.display = 'none'; }
    </script>
</body>
</html>
