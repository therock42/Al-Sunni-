<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سجل عائلة السني - النسخة النهائية الموحدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #1e40af; --bg: #f8fafc; --card: #ffffff; --gold: #b45309; --emerald: #059669; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: all 0.2s; }
        body { background-color: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; color: var(--primary); }
        .header { text-align: center; margin-bottom: 25px; }
        .full-lineage { font-size: 0.8rem; color: var(--gold); background: #fef3c7; padding: 8px 15px; border-radius: 20px; border: 1px solid #fde68a; font-weight: bold; }
        .search-container { width: 100%; max-width: 480px; position: relative; margin: 20px 0; }
        #familySearch { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 16px; outline: none; text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .search-results { position: absolute; top: 110%; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 2000; max-height: 300px; overflow-y: auto; display: none; border: 1px solid #e2e8f0; }
        .search-item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .search-item:hover { background: #f8fafc; color: var(--accent); }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 550px; }
        .branch-card { background: var(--card); padding: 20px; border-radius: 16px; text-align: center; border: 1px solid #e2e8f0; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .branch-card:hover { transform: translateY(-3px); border-color: var(--accent); color: var(--accent); }
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(4px); padding: 10px; }
        .modal-content { background: white; width: 100%; max-width: 480px; max-height: 90vh; border-radius: 24px; padding: 25px; overflow-y: auto; position: relative; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .info-section { background: #f0f7ff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 4px solid var(--accent); }
        .child-box { background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #f1f5f9; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .clickable { cursor: pointer; background: #fff; border-color: #cbd5e1; font-weight: bold; }
        .clickable:hover { background: #eff6ff; border-color: var(--accent); }
        .btn-link { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .back-btn { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <h2>سجل عائلة السني</h2>
        <div class="full-lineage">أحمد (السني) محمد بشير الحاج حسن علي محمد أبو حليمة</div>
    </div>

    <div class="search-container">
        <input type="text" id="familySearch" placeholder="ابحث عن اسم، زوج، أو ابن..." oninput="handleSearch(this.value)">
        <div id="searchResults" class="search-results"></div>
    </div>

    <div class="main-grid">
        <div class="branch-card" onclick="openModalById('soliman')">سليمان (الجاك)</div>
        <div class="branch-card" onclick="openModalById('othman')">عثمان (حنان)</div>
        <div class="branch-card" onclick="openModalById('mohammed_s')">محمد (السني)</div>
        <div class="branch-card" onclick="openModalById('bat_almona')">بت المنى</div>
    </div>

    <div class="modal" id="familyModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="back-btn" id="backBtn" onclick="goBack()" style="visibility: hidden;">→ العودة للسابق</button>
            <div id="modalBody"></div>
        </div>
    </div>

<script>
    const familyData = {
        // --- الفروع الرئيسية ---
        'soliman': { name: 'سليمان (الجاك)', children: ['عمر سليمان', 'النعمة سليمان', 'عبد العظيم سليمان', 'عبدالغني سليمان', 'نفيسة سليمان', 'مدينة سليمان', 'عبد القيوم سليمان', 'فاطمة سليمان', 'أم الحسين سليمان', 'الروضة سليمان'] },
        'othman': { name: 'عثمان (حنان)', children: ['محمد عثمان', 'عبدالله عثمان', 'زينب عثمان', 'هلالة عثمان'] },
        'mohammed_s': { name: 'محمد (السني)', children: ['عباس محمد', 'بخيت محمد', 'عبدالواحد محمد', 'عبدالرحمن محمد', 'عبدالرحيم محمد', 'عوض الله محمد', 'بلالة محمد', 'مسرة محمد'] },
        'bat_almona': { name: 'بت المنى', children: ['علي'] },

        // --- تفاصيل فرع عثمان (حنان) ---
        'abdullah_o': { name: 'عبدالله عثمان', partner: 'سعاد الصادق', children: ['المعز عبدالله', 'محمد عبدالله عثمان', 'مجدي عبدالله', 'منذر عبدالله', 'رحاب عبدالله', 'رانيا عبدالله', 'رندا عبدالله', 'ريان عبدالله'] },
        'zeinab_o': { name: 'زينب عثمان', partner: 'عمر سليمان' },
        'helala_o': { name: 'هلالة عثمان', partner: 'عباس محمد' },
        'mohammed_o': { name: 'محمد عثمان', partner: 'مدينة سليمان', children: ['اميمة محمد عثمان', 'نهلة محمد عثمان', 'ابتهاج محمد عثمان', 'ميساء محمد عثمان', 'نجلاء محمد عثمان', 'مجاهد محمد عثمان'] },

        // --- تفاصيل فرع سليمان (الجاك) ---
        'omar_s': { name: 'عمر سليمان', partner: 'زينب عثمان', children: ['شمس الدين عمر', 'حيدر عمر', 'سيف الدين عمر', 'سفيان عمر', 'إشراقة عمر', 'نادية عمر', 'رفيدة عمر', 'اعتدال عمر', 'رقية عمر', 'أمل عمر', 'هويدا عمر'] },
        'shams_o': { name: 'شمس الدين عمر', partner: 'نهلة محمد عثمان', children: ['سحر شمس الدين', 'محمد شمس الدين'] },
        'fatima_s': { name: 'فاطمة سليمان', partner: 'محمد علي فضيل', children: ['عبدالملك محمد علي فضيل', 'عبدالعزيز محمد علي فضيل', 'عبدالعظيم محمد علي فضيل', 'عبدالله محمد علي فضيل', 'عشة محمد علي فضيل', 'بتول محمد علي فضيل'] },
        'roda_s': { name: 'الروضة سليمان', partner: 'العوض بله', children: ['محمد العوض', 'صلاح العوض', 'حسن العوض', 'ثرية العوض'] },
        'abdelghani_s': { name: 'عبدالغني سليمان', partner: 'بلالة محمد', children: ['وضاح عبدالغني', 'سليمان عبدالغني', 'خالد عبدالغني', 'عمر عبدالغني', 'هاجر عبدالغني', 'هالة عبدالغني', 'هلالة عبدالغني', 'هديل عبدالغني'] },
        'nefisa_s': { name: 'نفيسة سليمان', partner: 'صالح علي ابوالحسن', children: ['هاشم صالح', 'عبدالحفيظ صالح', 'حسن صالح', 'منيرة صالح', 'أميرة صالح', 'سيداحمد صالح', 'معتصم صالح', 'كمال صالح', 'فتاح صالح', 'التجاني صالح', 'بخيتة صالح'] },
        
        // --- تفاصيل فرع محمد (السني) ---
        'abbas_ms': { name: 'عباس محمد', partner: 'هلالة عثمان', children: ['نازك عباس', 'محمد عباس', 'مهند عباس', 'مصطفى عباس', 'مهتدي عباس'] },
        'balala_ms': { name: 'بلالة محمد', partner: 'عبدالغني سليمان' },

        // --- سجلات فرعية (أبناء الأبناء) ---
        'abdelhafiz_s': { name: 'عبدالحفيظ صالح', partner: 'هدى عثمان عبدالماجد', children: ['محمد عبدالحفيظ', 'مهند عبدالحفيظ', 'مؤيد عبدالحفيظ', 'مصطفى عبدالحفيظ'] },
        'hassan_s': { name: 'حسن صالح', partner: 'هاجر الكرار', children: ['زحل حسن', 'ضحى حسن', 'اشتياق حسن', 'مجتبى حسن', 'عبدالله حسن', 'كمال حسن'] },
        'munira_s': { name: 'منيرة صالح', partner: 'الشيخ علي النخلي', children: ['صلاح الدين الشيخ', 'بهاء الدين الشيخ', 'هند الشيخ', 'هبة الشيخ'] },
        'amira_s': { name: 'أميرة صالح', partner: 'محمد عبدالقادر', children: ['غفران محمد', 'ريان محمد'] },
        'madina_s': { name: 'مدينة سليمان', partner: 'محمد عثمان' },
        'nahla_mo': { name: 'نهلة محمد عثمان', partner: 'شمس الدين عمر' },
        'alniama_s': { name: 'النعمة سليمان', partner: 'عبدالله محمد صالح', children: ['محمد عبدالله', 'إقبال عبدالله', 'محي الدين عبدالله', 'أبوالقاسم عبدالله', 'فايزة عبدالله', 'سعاد عبدالله'] },
        'abdelazim_s': { name: 'عبد العظيم سليمان', partner: 'هلالة بت المسور', children: ['حاتم عبدالعظيم', 'وليد عبدالعظيم', 'منال عبدالعظيم', 'نهال عبدالعظيم', 'أبوبكر عبدالعظيم', 'ملاذ عبدالعظيم', 'مروة عبدالعظيم'] },
        'abdelqayyum_s': { name: 'عبد القيوم سليمان', partner: 'مها مختار', children: ['محمد عبدالقيوم', 'احمد عبدالقيوم', 'علا عبدالقيوم'] }
    };

    const Utils = {
        normalize: (text) => {
            if (!text) return "";
            return text.trim()
                .replace(/[أإآ]/g, "ا")
                .replace(/ة/g, "ه")
                .replace(/ى/g, "ي")
                .replace(/عبد /g, "عبد") // لتوحيد البحث عن "عبد الله" و "عبدالله"
                .replace(/\s+/g, "");
        },
        findIdByName: (name) => {
            const target = Utils.normalize(name);
            return Object.keys(familyData).find(id => Utils.normalize(familyData[id].name) === target);
        }
    };

    let historyStack = [];

    function openModalById(id) {
        const person = familyData[id]; 
        if (!person) return;
        historyStack.push(id);
        renderModal(person);
    }

    function renderModal(person) {
        document.getElementById('backBtn').style.visibility = historyStack.length > 1 ? 'visible' : 'hidden';
        let html = `<div style="font-size:1.5rem; font-weight:700; color:var(--accent); text-align:center; margin-bottom:15px; border-bottom:2px solid #f1f5f9; padding-bottom:10px;">${person.name}</div>`;
        
        if (person.partner) {
            const partnerId = Utils.findIdByName(person.partner);
            html += `<div class="info-section">
                <strong>الزوج/ة:</strong> ${person.partner} 
                ${partnerId ? `<br><button class="btn-link" onclick="openModalById('${partnerId}')">سجل الشريك 🔗</button>` : ''}
            </div>`;
        }

        if (person.children && person.children.length > 0) {
            html += `<div style="margin-top:15px; margin-bottom:10px; font-weight:bold; color:var(--gold);">الأبناء (${person.children.length}):</div>`;
            html += person.children.map(childName => {
                const childId = Utils.findIdByName(childName);
                return `<div class="child-box ${childId ? 'clickable' : ''}" onclick="${childId ? `openModalById('${childId}')` : ''}">
                    ${childName} ${childId ? '<span style="color:var(--accent)">←</span>' : ''}
                </div>`;
            }).join('');
        } else {
            html += `<div style="text-align:center; color:#94a3b8; margin-top:20px; font-style:italic;">لا توجد بيانات أبناء مسجلة حالياً</div>`;
        }

        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('familyModal').style.display = 'flex';
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('familySearch').value = '';
    }

    function handleSearch(query) {
        const resultsDiv = document.getElementById('searchResults');
        if (query.length < 2) { resultsDiv.style.display = 'none'; return; }
        
        const normalizedQuery = Utils.normalize(query);
        const matches = Object.keys(familyData).filter(id => {
            const nameMatch = Utils.normalize(familyData[id].name).includes(normalizedQuery);
            const partnerMatch = familyData[id].partner && Utils.normalize(familyData[id].partner).includes(normalizedQuery);
            return nameMatch || partnerMatch;
        });

        if (matches.length > 0) {
            resultsDiv.innerHTML = matches.map(id => `
                <div class="search-item" onclick="openModalById('${id}')">
                    <span>${familyData[id].name}</span>
                    <span style="font-size:0.7rem; color:#64748b;">🔍 عرض</span>
                </div>
            `).join('');
            resultsDiv.style.display = 'block';
        } else {
            resultsDiv.innerHTML = `<div class="search-item" style="color:#94a3b8; cursor:default;">لا توجد نتائج مطابقة</div>`;
            resultsDiv.style.display = 'block';
        }
    }

    function goBack() { 
        historyStack.pop(); 
        const prevId = historyStack[historyStack.length - 1];
        renderModal(familyData[prevId]); 
    }

    function closeModal() { 
        document.getElementById('familyModal').style.display = 'none'; 
        historyStack = []; 
    }
</script>
</body>
</html>
